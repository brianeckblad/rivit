
# ============================================================================
# Root-level ansible.cfg — works when running ansible from the project root.
# The canonical config (with playbook-relative paths) lives in deployment/.
# All paths here are relative to the project root.
# ============================================================================

[defaults]
inventory             = deployment/inventories/hosts.yml
vault_password_file   = deployment/scripts/vault-password.sh
vault_identity        = default
vault_editor          = nano

host_key_checking     = False
retry_files_enabled   = False
deprecation_warnings  = False

gathering             = smart
fact_caching          = jsonfile
fact_caching_connection = /tmp/ansible_facts
fact_caching_timeout  = 3600

stdout_callback       = default
callbacks_enabled     = profile_tasks, timer

inventory_ignore_extensions = ~, .orig, .bak, .ini, .cfg, .retry, .pyc, .pyo, .example

[privilege_escalation]
become          = False
become_method   = sudo
become_user     = root
become_ask_pass = False
allow_world_readable_tmpfiles = True

[ssh_connection]
timeout    = 30
pipelining = True

