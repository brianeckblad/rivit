<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listing Tool</title>

    <!-- Favicon -->
    <link rel="icon" href="/static/favicon/favicon.ico" sizes="any">
    <link rel="icon" type="image/png" sizes="32x32" href="/static/favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/static/favicon/android-chrome-192x192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="/static/favicon/android-chrome-512x512.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/static/favicon/apple-touch-icon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/tokens.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-family);
            background: var(--color-bg);
            color: var(--color-text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .login-container {
            position: relative;
            width: 100%;
            max-width: 900px;
            height: 900px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* SVG Canvas for drawing - 2x original size */
        #drawingCanvas {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(2);
            width: 302px;
            height: 400px;
            z-index: 1;
        }

        /* Keep face visible always - remove hide class logic */

        /* Drawing path styles */
        .draw-path {
            stroke: var(--color-accent);
            stroke-width: 2;
            fill: none;
            stroke-linecap: round;
            stroke-linejoin: round;
            opacity: 0;
        }

        .draw-path.animate {
            opacity: 1;
            animation: drawStroke 0.4s ease-out forwards;
        }

        @keyframes drawStroke {
            from {
                stroke-dashoffset: var(--path-length);
            }
            to {
                stroke-dashoffset: 0;
            }
        }

        /* Login form - appears 3 seconds after face drawing completes */
        .login-form {
            position: absolute;
            top: 35%;
            left: 85%;
            transform: translate(-50%, -50%);
            z-index: 2;
            opacity: 0;
            background: rgba(27, 27, 27, 0.95);
            padding: 32px;
            border-radius: var(--radius-lg);
            border: 2px solid var(--color-accent);
            box-shadow: var(--shadow-lg);
            backdrop-filter: blur(10px);
            width: 320px;
        }

        /* Show form immediately when there's an error (skip animation) */
        .login-form.show-immediately {
            opacity: 1;
        }

        /* Show form with delay on first load */
        .login-form.show-delayed {
            animation: fadeIn 0.5s ease-out 0.5s forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.9);
            }
            to {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
            }
        }

        .login-form h2 {
            text-align: center;
            color: var(--color-accent);
            margin-bottom: 24px;
            font-size: 24px;
            font-weight: 700;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            color: var(--color-text);
            margin-bottom: 8px;
            font-size: var(--font-size-base);
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            background: var(--color-inset);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-sm);
            color: var(--color-text);
            font-family: var(--font-family);
            font-size: var(--font-size-base);
            transition: all 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--color-border-focus);
            box-shadow: 0 0 0 3px var(--color-accent-subtle);
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: var(--color-accent);
            color: var(--color-accent-text);
            border: none;
            border-radius: var(--radius-sm);
            font-family: var(--font-family);
            font-size: var(--font-size-md);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 8px;
        }

        .login-btn:hover {
            background: var(--color-accent-hover);
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        /* Drawing hands indicator */
        .hand-indicator {
            position: absolute;
            width: 50px;
            height: 50px;
            background: var(--color-accent-subtle);
            border: 3px solid var(--color-accent);
            border-radius: 50%;
            pointer-events: none;
            z-index: 3;
            opacity: 0;
            transition: all 0.15s ease-out;
        }

        .hand-indicator.active {
            opacity: 1;
        }

        .hand-indicator::before {
            content: '✍️';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 24px;
        }

        /* Responsive design for tablets and mobile */
        @media (max-width: 1024px) {
            .login-container {
                max-width: 700px;
                height: 700px;
            }

            #drawingCanvas {
                transform: translate(-50%, -50%) scale(1.5);
            }

            .login-form {
                top: 40%;
                left: 70%;
                width: 280px;
                padding: 24px;
            }

            .hand-indicator {
                width: 40px;
                height: 40px;
            }

            .hand-indicator::before {
                font-size: 20px;
            }
        }

        @media (max-width: 768px) {
            body {
                overflow-y: auto;
            }

            .login-container {
                max-width: 100%;
                height: auto;
                min-height: 100vh;
                padding: 0;
                flex-direction: column;
                justify-content: flex-start;
                align-items: center;
            }

            #drawingCanvas {
                position: static;
                transform: scale(1);
                margin: 0 auto;
                width: 302px;
                height: 400px;
                display: block;
            }

            .login-form {
                position: static !important;
                transform: none !important;
                margin-left: auto !important;
                margin-right: auto !important;
                margin-top: 0 !important;
                margin-bottom: 0 !important;
                width: calc(100% - 40px) !important;
                max-width: 320px !important;
                padding: 20px !important;
                left: auto !important;
                right: auto !important;
                top: auto !important;
            }

            .hand-indicator {
                display: none !important;
            }

            .form-group {
                margin-bottom: 16px;
            }

            .form-group label {
                font-size: 13px;
            }

            .form-group input {
                padding: 10px 14px;
                font-size: 13px;
            }

            .login-btn {
                padding: 12px;
                font-size: 14px;
            }

            .hand-indicator {
                width: 30px;
                height: 30px;
                border-width: 2px;
            }

            .hand-indicator::before {
                font-size: 16px;
            }
        }

        @media (max-width: 480px) {
            #drawingCanvas {
                margin: 0 auto;
                width: 302px;
                height: 400px;
                transform: scale(0.75);
            }

            .login-form {
                margin: 0 auto;
                width: calc(100% - 32px);
                padding: 16px;
            }

            .form-group input {
                padding: 8px 12px;
            }

            .login-btn {
                padding: 10px;
            }
        }

    </style>
</head>
<body>

    <div class="login-container">
        <!-- SVG Canvas for animated drawing -->
        <svg id="drawingCanvas" viewBox="0 0 302 400" xmlns="http://www.w3.org/2000/svg">
            <!-- Paths will be generated by JavaScript from extracted data -->
        </svg>

        <!-- Hand indicators (only show during animation, not on error) -->
        <div class="hand-indicator" id="hand1"></div>
        <div class="hand-indicator" id="hand2"></div>
        <div class="hand-indicator" id="hand3"></div>

        <!-- Login Form -->
        <form class="login-form {% if get_flashed_messages() %}show-immediately{% else %}show-delayed{% endif %}" method="POST" action="/login">
            <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
            <h2>Sign In</h2>
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        {% if category == 'error' %}
                        <div style="background: var(--color-danger-subtle); border: 1px solid var(--color-danger); color: var(--color-danger); padding: 12px; border-radius: var(--radius-sm); margin-bottom: 16px; font-size: var(--font-size-base);">
                            {{ message }}
                        </div>
                        {% endif %}
                    {% endfor %}
                {% endif %}
            {% endwith %}
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required autocomplete="username">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required autocomplete="current-password">
            </div>
            <button type="submit" class="login-btn">Sign In</button>
        </form>
    </div>

        const svg = document.getElementById('drawingCanvas');
        const hands = [
            document.getElementById('hand1'),
            document.getElementById('hand2'),
            document.getElementById('hand3')
        ];

        // Create and animate paths with a 3-second initial delay
        function startDrawing() {
            drawingData.paths.forEach((pathData, index) => {
                const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                path.setAttribute('d', pathData.d);
                path.classList.add('draw-path');

                // Calculate path length for animation
                svg.appendChild(path);
                const length = path.getTotalLength();
                path.style.strokeDasharray = length;
                path.style.strokeDashoffset = length;
                path.style.setProperty('--path-length', length);

                // Animate with delay (0.25 seconds + half original delay for 50% faster)
                const totalDelay = 250 + (pathData.delay * 500);
                setTimeout(() => {
                    path.classList.add('animate');

                    // Show hand indicator at start of path
                    const hand = hands[pathData.hand - 1];
                    const startPoint = path.getPointAtLength(0);

                    // Scale factor of 2 for positioning hands
                    hand.style.left = (startPoint.x * 2 + 200) + 'px';
                    hand.style.top = (startPoint.y * 2 - 50) + 'px';
                    hand.classList.add('active');

                    // Move hand along path (50% faster)
                    let progress = 0;
                    const animationDuration = 400; // matches CSS animation (50% faster)
                    const interval = setInterval(() => {
                        progress += 20;
                        if (progress <= animationDuration) {
                            const point = path.getPointAtLength((progress / animationDuration) * length);
                            hand.style.left = (point.x * 2 + 200) + 'px';
                            hand.style.top = (point.y * 2 - 50) + 'px';
                        } else {
                            clearInterval(interval);
                            hand.classList.remove('active');
                        }
                    }, 20);
                }, totalDelay);
            });
        }

        // Always draw the face on page load (50% faster)
        window.addEventListener('load', () => {
            const hasError = document.querySelector('.login-form.show-immediately');
            if (hasError) {
                // If there's an error, draw the face instantly (no animation, just show final state)
                drawingData.paths.forEach((pathData) => {
                    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                    path.setAttribute('d', pathData.d);
                    path.classList.add('draw-path');
                    svg.appendChild(path);
                    const length = path.getTotalLength();
                    path.style.strokeDasharray = length;
                    path.style.strokeDashoffset = 0;
                    path.style.opacity = 1;
                });
            } else {
                // First visit - animate the drawing (50% faster)
                setTimeout(startDrawing, 250);
            }
        });
    </script>
</body>
</html>
