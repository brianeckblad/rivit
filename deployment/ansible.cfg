[defaults]
# Default inventory location (can be overridden with -i flag)
inventory = inventories/hosts.yml

# SSH connection identity (ansible_user, ansible_ssh_private_key_file) lives in
# inventories/hosts.yml as literal values synced from vault by scripts/load-vars.sh.

# Disable host key checking for local connections
host_key_checking = False

# Don't create .retry files on failure
retry_files_enabled = False

# Ignore .example and .bak files when a directory is passed with -i
inventory_ignore_extensions = ~, .orig, .bak, .ini, .cfg, .retry, .pyc, .pyo, .example

# Suppress deprecation warnings from amazon.aws collection internals
# The _text import warnings come from the collection code, not our playbooks
# These will be fixed in a future amazon.aws release (tracked upstream)
# Re-enable after upgrading: ansible-galaxy collection install amazon.aws --upgrade
deprecation_warnings = False

# Smart fact gathering
gathering = smart
fact_caching = jsonfile
fact_caching_connection = /tmp/ansible_facts
fact_caching_timeout = 3600

# Display settings
stdout_callback = default
callbacks_enabled = profile_tasks, timer

# Vault configuration
# Uses vault-password.sh script to properly expand home directory (~)
# This allows playbooks to automatically decrypt vault.yml without --ask-vault-pass
vault_password_file = scripts/vault-password.sh
vault_identity = default
vault_editor = nano


[privilege_escalation]
become = False
become_method = sudo
become_user = root
become_ask_pass = False
allow_world_readable_tmpfiles = True

[ssh_connection]
# SSH timeout settings
timeout = 30
pipelining = True
