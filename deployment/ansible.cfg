[defaults]
# Default inventory location (can be overridden with -i flag)
inventory = hosts.yml

# Disable host key checking for local connections
host_key_checking = False

# Don't create .retry files on failure
retry_files_enabled = False

# Smart fact gathering
gathering = smart
fact_caching = jsonfile
fact_caching_connection = /tmp/ansible_facts
fact_caching_timeout = 3600

# Display settings
stdout_callback = default
callbacks_enabled = profile_tasks, timer

# Vault configuration
# This allows playbooks to automatically decrypt vault.yml without --ask-vault-pass
vault_password_file = ~/.vault_pass
vault_editor = nano

[defaults:result_format]
result_format = yaml

# Roles and collections paths
roles_path = roles
collections_path = collections

[privilege_escalation]
become = True
become_method = sudo
become_user = root
become_ask_pass = False
allow_world_readable_tmpfiles = True

[ssh_connection]
# SSH timeout settings
timeout = 30
pipelining = True
