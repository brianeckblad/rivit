---
# Variables applicable to all environments
# NOTE: Sensitive values are stored in vault.yml (encrypted)

# ============================================================================
# Application Identity - CHANGE THESE TO RENAME YOUR APP
# ============================================================================
app_name: rampe                                  # Technical name (used for paths, services)
app_display_name: "Rampe"                        # Human-readable name (used in docs, UI)
app_url: "https://github.com/yourusername/{{ app_name }}"  # Repository URL

# ============================================================================
# Application Settings
# ============================================================================
service_name: "{{ app_name }}"               # Systemd/supervisor service name
app_user: ubuntu                              # Linux user running the app
app_dir: "/home/{{ app_user }}/{{ app_name }}"  # Application directory
venv_dir: "/home/{{ app_user }}/.venv"        # Virtual environment (in user's home)
python_version: "3.10"

# Git repository - MOVED TO VAULT (contains your GitHub username)
git_repo: "{{ vault_git_repo }}"
git_branch: main

# Gunicorn settings
gunicorn_workers: 4
gunicorn_bind: "127.0.0.1:8000"
gunicorn_timeout: 120

# Log settings
log_dir: "/var/log/{{ app_name }}"           # Log directory (uses app_name)
log_retention_days: 20
log_max_size: "10M"

# Backup cleanup settings
backup_cleanup_hour: "3"
backup_cleanup_minute: "0"
backup_retention_days: 30

# AWS Configuration
# Note: EC2 instances use IAM roles for AWS access (no credentials needed!)
# These values are for Secrets Manager and S3 bucket names only
aws_region: "{{ vault_aws_region | default('us-east-1') }}"
s3_bucket_name: "{{ vault_s3_bucket_name }}"
s3_folder: "{{ vault_s3_folder | default('production') }}"
secret_name: "{{ app_name }}/production"     # Automatically uses app_name

# S3 versioning retention (in days) - configurable
s3_version_retention_days: 30  # Keep old versions for 30 days

# SNS topic for alerts (optional)
sns_topic_arn: "{{ vault_sns_topic_arn | default('') }}"

# Application credentials - MOVED TO VAULT
app_username: "{{ vault_app_username }}"
app_password: "{{ vault_app_password }}"

# System packages
system_packages:
  - python3
  - python3-pip
  - python3-venv
  - python3-dev
  - build-essential
  - nginx
  - git
  - curl
  - supervisor
  - libjpeg-dev
  - zlib1g-dev
  - libpng-dev
  - net-tools
