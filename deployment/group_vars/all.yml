---
# ============================================================================
# ALL CONFIGURATION IS IN vault.yml (ENCRYPTED)
# ============================================================================
# This file is intentionally minimal.  All deployment variables — identity,
# credentials, tuning, infrastructure sizing, and computed paths — live in
# vault.yml so the encrypted file can be committed to git.
#
# Edit configuration:
#   ansible-vault edit group_vars/vault.yml --vault-password-file ~/.vault_pass
#
# View configuration:
#   ansible-vault view group_vars/vault.yml --vault-password-file ~/.vault_pass
# ============================================================================

# SSH connection variables — set here (not in the inventory file) so that
# the Jinja2 references to vault variables resolve correctly.  Ansible
# resolves group_vars together with vault; inventory templates are parsed
# before vault is available, which is why {{server_admin_user}} fails there.
ansible_user: "{{ server_admin_user }}"
ansible_ssh_private_key_file: "{{ ssh_key_file }}"
