---
# ============================================================================
# ALL CONFIGURATION IS IN vault.yml (ENCRYPTED)
# ============================================================================
# This file is intentionally minimal.  All deployment variables — identity,
# credentials, tuning, infrastructure sizing, and computed paths — live in
# vault.yml so the encrypted file can be committed to git.
#
# Edit configuration:
#   ansible-vault edit group_vars/vault.yml --vault-password-file ~/.vault_pass
#
# View configuration:
#   ansible-vault view group_vars/vault.yml --vault-password-file ~/.vault_pass
# ============================================================================
#
# NOTE: ansible_user / ansible_ssh_private_key_file are NOT set here.
# Ansible resolves connection keywords before vault variable interpolation
# completes, so template expressions like "{{ server_admin_user }}" fail with
# 'undefined' errors for both adhoc and playbook runs.
# These values live in ansible.cfg (remote_user, private_key_file) instead,
# kept in sync by scripts/load-vars.sh.
