---
# ============================================================================
# PRODUCTION ENVIRONMENT VARIABLES
# ============================================================================
# This file inherits from group_vars/all.yml and adds production overrides
#
# ⚠️ USER CONFIGURATION: Edit group_vars/all.yml (not this file)
# ⚠️ SECRETS: Edit vault.yml (encrypted)
#
# This file is for production-specific overrides only
# ============================================================================

# ============================================================================
# PRODUCTION-SPECIFIC OVERRIDES (OPTIONAL)
# ============================================================================
# Uncomment and modify if production needs different settings than all.yml

# Example: More workers for production
# gunicorn_workers: 8

# Example: Larger logs for production
# log_max_size: "100M"

# Example: Different Python version
# python_version: "3.11"

# ============================================================================
# AUTO-CONFIGURED (DO NOT EDIT)
# ============================================================================
# These inherit from all.yml and vault.yml
# Listed here for reference only

# From all.yml (user configured there):
app_name: "{{ app_name }}"
service_name: "{{ app_name }}"
app_user: "{{ app_user }}"
admin_user: "{{ admin_user }}"
app_dir: "/home/{{ admin_user }}/{{ app_name }}"
python_version: "{{ python_version | default('3.10') }}"
git_branch: "{{ git_branch | default('main') }}"
gunicorn_workers: "{{ gunicorn_workers | default(4) }}"
gunicorn_bind: "{{ gunicorn_bind | default('127.0.0.1:8000') }}"
gunicorn_timeout: "{{ gunicorn_timeout | default(120) }}"
log_dir: "/var/log/{{ app_name }}"
log_retention_days: "{{ log_retention_days | default(20) }}"
log_max_size: "{{ log_max_size | default('10M') }}"
backup_cleanup_hour: "{{ backup_cleanup_hour | default('3') }}"
backup_cleanup_minute: "{{ backup_cleanup_minute | default('0') }}"
backup_retention_days: "{{ backup_retention_days | default(30) }}"

# From vault.yml (secrets configured there):
git_repo: "{{ vault_git_repo }}"
aws_region: "{{ vault_aws_region }}"
s3_bucket_name: "{{ vault_s3_bucket_name }}"
s3_folder: "{{ vault_s3_folder | default('production') }}"
app_username: "{{ vault_app_username }}"
app_password: "{{ vault_app_password }}"

# System packages (from all.yml)
system_packages:
  - python3
  - python3-pip
  - python3-venv
  - python3-dev
  - build-essential
  - nginx
  - git
  - curl
  - supervisor
  - libjpeg-dev
  - zlib1g-dev
  - libpng-dev
  - net-tools