---
# Playbook to rotate secrets between Ansible Vault and AWS Secrets Manager
# This replaces secret-rotate.sh
#
# Usage: ansible-playbook playbooks/secret-rotate.yml \
#          -e secret_key=ebay_token \
#          --vault-password-file ~/.vault_pass
#
# IMPORTANT: If vault.yml is encrypted, provide vault password via:
# 1. ~/.vault_pass file (recommended), OR
# 2. --ask-vault-pass flag (will prompt for password)

- name: Rotate Secret
  hosts: localhost
  gather_facts: no
  vars_files:
    - ../group_vars/all.yml
    - ../group_vars/vault.yml

  vars:
    aws_secret_name: "{{ app_name }}/secrets"

  tasks:
    - name: Validate secret_key provided
      fail:
        msg: "Please provide secret_key: ansible-playbook playbooks/secret-rotate.yml -e secret_key=YOUR_KEY"
      when: secret_key is not defined

    - name: Read vault file
      command: ansible-vault view {{ playbook_dir }}/../group_vars/vault.yml --vault-password-file ~/.vault_pass
      register: vault_contents
      changed_when: false

    - name: Extract new secret value from vault
      set_fact:
        new_secret_value: "{{ vault_contents.stdout | regex_search('vault_' + secret_key + '_new: [\"\\']?(.+?)[\"\\']?$', '\\1', multiline=True) | first }}"
      failed_when: new_secret_value is not defined or new_secret_value == ""

    - name: Display rotation info
      debug:
        msg:
          - "Rotating secret: {{ secret_key }}"
          - "AWS Secret: {{ aws_secret_name }}"
          - "Creating AWSPENDING version with new value"

    - name: Get current secret from AWS
      command: >
        aws secretsmanager get-secret-value
        --secret-id {{ aws_secret_name }}
        --query SecretString
        --output text
      register: current_secret
      changed_when: false

    - name: Parse current secrets
      set_fact:
        current_secrets: "{{ current_secret.stdout | from_json }}"

    - name: Create new secret JSON with updated value
      set_fact:
        new_secrets: "{{ current_secrets | combine({secret_key: new_secret_value}) }}"

    - name: Update AWS secret (creates AWSPENDING version)
      command: >
        aws secretsmanager update-secret
        --secret-id {{ aws_secret_name }}
        --secret-string '{{ new_secrets | to_json }}'
      register: update_result

    - name: Display success message
      debug:
        msg:
          - "✓ Secret rotation initiated!"
          - "Status: AWSPENDING version created"
          - ""
          - "Next steps:"
          - "1. Test your application with new secret"
          - "2. If successful: ansible-playbook playbooks/secret-promote.yml -e secret_key={{ secret_key }}"
          - "3. If failed: Rollback is automatic (AWSCURRENT unchanged)"

    - name: Save rotation info
      copy:
        content: |
          Secret Rotation: {{ secret_key }}
          Timestamp: {{ ansible_date_time.iso8601 }}
          Status: AWSPENDING version created
          AWS Secret: {{ aws_secret_name }}
          
          Next: Test application, then run secret-promote.yml
        dest: "{{ playbook_dir }}/../.last-rotation.txt"

