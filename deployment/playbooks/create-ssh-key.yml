---
# Playbook to create SSH key pair for EC2 access
# Single purpose: Create SSH key pair in AWS and save to local machine
#
# IMPORTANT SECURITY NOTES:
#   - The private key is generated ONCE and saved locally
#   - AWS does not store the private key - you must keep it safe
#   - If you lose this key, you cannot access the instance (unless using Systems Manager)
#   - Treat this file like a password - never commit to git, never share
#   - File permissions are set to 0400 (read-only for security)
#
# Usage: ansible-playbook playbooks/create-ssh-key.yml

- name: Create SSH Key Pair
  hosts: localhost
  gather_facts: no
  vars_files:
    - ../group_vars/all.yml
    - ../group_vars/vault.yml

  tasks:
    - name: Check if SSH key already exists locally
      stat:
        path: "~/.ssh/{{ app_name }}-key.pem"
      register: ssh_key_file

    - name: Create SSH key pair in AWS
      amazon.aws.ec2_key:
        name: "{{ app_name }}-key"
        region: "{{ aws_region }}"
        state: present
      register: key_pair

    - name: Save private key locally (only if newly created)
      copy:
        content: "{{ key_pair.key.private_key }}"
        dest: "~/.ssh/{{ app_name }}-key.pem"
        mode: '0400'
        backup: yes
      when: key_pair.changed

    - name: Create .ssh directory if missing
      file:
        path: "~/.ssh"
        state: directory
        mode: '0700'

    - name: Verify key file permissions are secure
      file:
        path: "~/.ssh/{{ app_name }}-key.pem"
        mode: '0400'
        state: file

    - name: Get SSH key fingerprint from AWS
      amazon.aws.ec2_key_info:
        names:
          - "{{ app_name }}-key"
        region: "{{ aws_region }}"
      register: key_info

    - name: Display SSH key information
      debug:
        msg:
          - ""
          - "╔════════════════════════════════════════════════════════════╗"
          - "║                                                            ║"
          - "║   ✓ SSH Key Pair Created Successfully                     ║"
          - "║                                                            ║"
          - "╚════════════════════════════════════════════════════════════╝"
          - ""
          - "KEY INFORMATION:"
          - "  Key Name:             {{ app_name }}-key"
          - "  Key Type:             RSA 2048-bit"
          - "  Fingerprint:          {{ key_info.keys[0].key_fingerprint | default('N/A') }}"
          - "  AWS Region:           {{ aws_region }}"
          - ""
          - "LOCAL FILE:"
          - "  Location:             ~/.ssh/{{ app_name }}-key.pem"
          - "  File Permissions:     0400 (read-only)"
          - "  Size:                 ~1.7 KB (RSA private key)"
          - ""
          - "USAGE:"
          - "  ssh -i ~/.ssh/{{ app_name }}-key.pem ubuntu@INSTANCE_IP"
          - ""
          - "SECURITY REMINDERS:"
          - "  ⚠️  NEVER commit this key to Git or GitHub"
          - "  ⚠️  NEVER share this key with anyone"
          - "  ⚠️  NEVER store in version control"
          - "  ⚠️  If lost, you cannot access the instance (unless using AWS Systems Manager)"
          - "  ⚠️  Use 'chmod 0400' to restrict permissions"
          - "  ✓  Keep backups in a secure location"
          - "  ✓  Use a password manager to track the location"
          - ""
          - "BACKUP RECOMMENDATIONS:"
          - "  1. Store in password manager (1Password, LastPass, etc.)"
          - "  2. Encrypted backup to external drive"
          - "  3. AWS Secrets Manager (optional, for team access)"
          - ""
          - "IF YOU LOSE THIS KEY:"
          - "  1. You can use AWS Systems Manager Session Manager (no SSH key needed)"
          - "  2. Or: Create an AMI snapshot and launch new instance with new key"
          - ""
          - "NEXT STEP:"
          - "  ansible-playbook playbooks/create-security-group.yml"
          - ""

