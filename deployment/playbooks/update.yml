---
# Update deployed application
# Usage: ansible-playbook -i inventories playbooks/update.yml

- name: Update Listing App
  hosts: all
  become: yes
  vars_files:
    - ../group_vars/all.yml
    - ../group_vars/vault.yml

  tasks:

    - name: Display current status
      block:
        - name: Get current branch
          become_user: "{{ admin_user }}"
          command: git branch --show-current
          args:
            chdir: "{{ app_dir }}"
          register: current_branch

        - name: Get current commit
          become_user: "{{ admin_user }}"
          command: git log -1 --oneline
          args:
            chdir: "{{ app_dir }}"
          register: current_commit

        - name: Show current status
          debug:
            msg:
              - "Current branch: {{ current_branch.stdout }}"
              - "Current commit: {{ current_commit.stdout }}"

    - name: Configure git credential cache (15 min timeout)
      become_user: "{{ admin_user }}"
      command: git config credential.helper 'cache --timeout=900'
      args:
        chdir: "{{ app_dir }}"
      changed_when: false

    - name: Stash local changes if any
      become_user: "{{ admin_user }}"
      command: git stash
      args:
        chdir: "{{ app_dir }}"
      register: git_stash
      changed_when: "'No local changes to save' not in git_stash.stdout"

    - name: Pull latest code from git
      become_user: "{{ admin_user }}"
      command: git pull origin {{ git_branch }}
      args:
        chdir: "{{ app_dir }}"
      register: git_pull

    - name: Check if requirements.txt changed
      become_user: "{{ admin_user }}"
      command: git diff HEAD@{1} HEAD --name-only
      args:
        chdir: "{{ app_dir }}"
      register: changed_files
      changed_when: false
      failed_when: false

    - name: Check if deployment requirements.txt exists
      stat:
        path: "{{ app_dir }}/deployment/requirements.txt"
      register: deployment_requirements

    - name: Update Python dependencies from deployment directory
      become_user: "{{ admin_user }}"
      pip:
        requirements: "{{ app_dir }}/deployment/requirements.txt"
        virtualenv: "{{ venv_dir }}"
      when: deployment_requirements.stat.exists

    - name: Update Python dependencies from root (fallback)
      become_user: "{{ admin_user }}"
      pip:
        requirements: "{{ app_dir }}/requirements.txt"
        virtualenv: "{{ venv_dir }}"
      when: not deployment_requirements.stat.exists

    - name: Ensure log directory exists
      file:
        path: "{{ log_dir }}"
        state: directory
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: '0755'

    - name: Verify only {{ app_name }} configuration exists
      block:
        - name: Check for unexpected nginx site configs
          find:
            paths:
              - /etc/nginx/sites-available
              - /etc/nginx/sites-enabled
            patterns: "*"
            file_type: any
          register: nginx_configs

        - name: Display nginx configurations found
          debug:
            msg: "Found nginx configs: {{ nginx_configs.files | map(attribute='path') | list }}"

        - name: Check for unexpected supervisor configs
          find:
            paths: /etc/supervisor/conf.d
            patterns: "*.conf"
          register: supervisor_configs

        - name: Display supervisor configurations found
          debug:
            msg: "Found supervisor configs: {{ supervisor_configs.files | map(attribute='path') | list }}"

        - name: Warn if unexpected configs found
          debug:
            msg: "⚠️  WARNING: Unexpected configuration files detected. Expected only '{{ app_name }}' and 'default' configs."
          when: >
            (nginx_configs.files | map(attribute='path') | reject('search', app_name ~ '|default') | list | length > 0) or
            (supervisor_configs.files | map(attribute='path') | reject('search', app_name) | list | length > 0)

    - name: Ensure instance directory exists
      file:
        path: "{{ app_dir }}/instance"
        state: directory
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: '0755'

    - name: Update app_version with commit count
      block:
        - name: Get commit count
          become_user: "{{ admin_user }}"
          command: git rev-list --count HEAD
          args:
            chdir: "{{ app_dir }}"
          register: commit_count
          changed_when: false

        - name: Write commit count to app_version file
          copy:
            content: "{{ commit_count.stdout }}\n"
            dest: "{{ app_dir }}/instance/app_version"
            owner: "{{ app_user }}"
            group: "{{ app_user }}"
            mode: '0644'

        - name: Display updated version
          debug:
            msg: "✓ Updated app_version to: {{ commit_count.stdout }}"

    - name: Ensure scripts directory exists
      file:
        path: "{{ app_dir }}/scripts"
        state: directory
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: '0755'

    - name: Ensure backup cleanup script is executable
      file:
        path: "{{ app_dir }}/app/scripts/cleanup_old_backups.py"
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: '0755'

    - name: Ensure cron job exists for backup cleanup
      cron:
        name: "Cleanup old backups (>{{ backup_retention_days }} days)"
        minute: "{{ backup_cleanup_minute }}"
        hour: "{{ backup_cleanup_hour }}"
        job: "cd {{ app_dir }} && {{ venv_dir }}/bin/python {{ app_dir }}/app/scripts/cleanup_old_backups.py >> {{ log_dir }}/cleanup.log 2>&1"
        user: "{{ app_user }}"
        state: present

    - name: Update nginx configuration
      template:
        src: ../templates/nginx.conf.j2
        dest: /etc/nginx/sites-available/{{ service_name }}
        owner: root
        group: root
        mode: '0644'

    - name: Update supervisor configuration
      template:
        src: ../templates/supervisor.conf.j2
        dest: /etc/supervisor/conf.d/{{ service_name }}.conf
        owner: root
        group: root
        mode: '0644'

    - name: Restart nginx
      service:
        name: nginx
        state: restarted

    - name: Reload supervisor configuration
      command: supervisorctl reread
      register: supervisor_reread
      changed_when: false
      failed_when: false

    - name: Reload systemd daemon
      systemd:
        daemon_reload: yes

    - name: Restart application service
      systemd:
        name: "{{ service_name }}.service"
        state: restarted
        enabled: yes

    - name: Wait for application to start
      wait_for:
        timeout: 5

    - name: Check application status
      command: systemctl status {{ service_name }}.service
      register: app_status
      changed_when: false
      failed_when: false

    - name: Display application status
      debug:
        msg: "{{ app_status.stdout_lines }}"

    - name: Get recent logs
      shell: tail -15 {{ log_dir }}/app.log
      register: recent_logs
      changed_when: false
      failed_when: false

    - name: Display recent logs
      debug:
        msg: "{{ recent_logs.stdout_lines }}"
      when: recent_logs.stdout is defined

    - name: Show new commit info
      block:
        - name: Get new commit
          become_user: "{{ app_user }}"
          command: git log -1 --oneline
          args:
            chdir: "{{ app_dir }}"
          register: new_commit

        - name: Apply security permissions
          import_tasks: harden-permissions-tasks.yml

        - name: Display update summary
          debug:
            msg:
              - "✓ Update Complete!"
              - "New commit: {{ new_commit.stdout }}"
              - "Application status: {{ app_status.stdout }}"
