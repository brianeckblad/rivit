---
# Initial server setup and application deployment
# Usage: ansible-playbook -i inventories playbooks/setup.yml

- name: Configure Listing App Server
  hosts: all
  become: yes
  vars_files:
    - ../group_vars/all.yml
    - ../group_vars/vault.yml

  tasks:

    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install system dependencies
      apt:
        name: "{{ system_packages }}"
        state: present

    # =========================================================================
    # SECURITY: Create dedicated application user
    # =========================================================================
    # This user:
    #   - Has no shell access (nologin)
    #   - Has no home directory
    #   - Cannot SSH to the server
    #   - Is a system user (UID < 1000)
    #   - Can only run the application (via systemd)
    # Benefits:
    #   - Principle of least privilege
    #   - Limited blast radius if app compromised
    #   - Separates deployment from runtime permissions
    - name: Create dedicated application user (no shell, no SSH)
      user:
        name: "{{ app_user }}"
        comment: "{{ app_display_name }} Application User (no login)"
        shell: /usr/sbin/nologin
        system: yes
        create_home: no
        state: present
      when: app_user != admin_user

    - name: Create application directory
      file:
        path: "{{ app_dir }}"
        state: directory
        owner: "{{ admin_user }}"
        group: "{{ admin_user }}"
        mode: '0755'

    - name: Create instance directory for data persistence
      file:
        path: "{{ app_dir }}/instance"
        state: directory
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: '0755'

    - name: Create log directory
      file:
        path: "{{ log_dir }}"
        state: directory
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: '0755'

    - name: Remove legacy supervisor configuration
      file:
        path: /etc/supervisor/conf.d/badartlistingtool.conf
        state: absent

    - name: Remove legacy nginx configuration
      file:
        path: "{{ item }}"
        state: absent
      loop:
        - /etc/nginx/sites-available/badartlistingtool
        - /etc/nginx/sites-enabled/badartlistingtool
        - /etc/nginx/sites-available/badart-app
        - /etc/nginx/sites-enabled/badart-app

    - name: Check if application code exists
      stat:
        path: "{{ app_dir }}/runapp.py"
      register: app_code_exists

    - name: Clone application code from git
      become_user: "{{ admin_user }}"
      git:
        repo: "{{ git_repo }}"
        dest: "{{ app_dir }}"
        version: "{{ git_branch }}"
        force: no
      when: not app_code_exists.stat.exists

    - name: Create Python virtual environment
      become_user: "{{ admin_user }}"
      command: python3 -m venv {{ venv_dir }}
      args:
        creates: "{{ venv_dir }}/bin/activate"

    - name: Upgrade pip in virtual environment
      become_user: "{{ admin_user }}"
      pip:
        name: pip
        state: latest
        virtualenv: "{{ venv_dir }}"

    - name: Check if deployment requirements.txt exists
      stat:
        path: "{{ app_dir }}/deployment/requirements.txt"
      register: deployment_requirements_file

    - name: Check if root requirements.txt exists
      stat:
        path: "{{ app_dir }}/requirements.txt"
      register: root_requirements_file

    - name: Install Python dependencies from deployment directory
      become_user: "{{ admin_user }}"
      pip:
        requirements: "{{ app_dir }}/deployment/requirements.txt"
        virtualenv: "{{ venv_dir }}"
      when: deployment_requirements_file.stat.exists

    - name: Install Python dependencies from root (fallback)
      become_user: "{{ admin_user }}"
      pip:
        requirements: "{{ app_dir }}/requirements.txt"
        virtualenv: "{{ venv_dir }}"
      when: not deployment_requirements_file.stat.exists and root_requirements_file.stat.exists

    - name: Install gunicorn in virtual environment
      become_user: "{{ admin_user }}"
      pip:
        name: gunicorn
        virtualenv: "{{ venv_dir }}"
        state: present
        virtualenv: "{{ venv_dir }}"

    - name: Check if .env file already exists
      stat:
        path: "{{ app_dir }}/.env"
      register: env_file

    - name: Read existing SECRET_KEY if .env exists
      shell: grep '^SECRET_KEY=' {{ app_dir }}/.env | cut -d'=' -f2
      register: existing_secret_key
      when: env_file.stat.exists
      changed_when: false
      failed_when: false

    - name: Read existing EBAY_VERIFICATION_TOKEN if .env exists
      shell: grep '^EBAY_VERIFICATION_TOKEN=' {{ app_dir }}/.env | cut -d'=' -f2
      register: existing_ebay_token
      when: env_file.stat.exists
      changed_when: false
      failed_when: false

    - name: Generate new SECRET_KEY if needed
      set_fact:
        secret_key: "{{ existing_secret_key.stdout if (env_file.stat.exists and existing_secret_key.stdout != '') else lookup('password', '/dev/null chars=ascii_letters,digits,punctuation length=50') }}"

    - name: Generate new EBAY_VERIFICATION_TOKEN if needed (64 chars)
      set_fact:
        ebay_verification_token: "{{ existing_ebay_token.stdout if (env_file.stat.exists and existing_ebay_token.stdout != '' and existing_ebay_token.stdout != 'your-64-character-token-here') else lookup('password', '/dev/null chars=ascii_letters,digits length=64') }}"

    # =========================================================================
    # Create .env file with application configuration
    # =========================================================================
    # Note: This .env file contains NON-SECRET configuration only.
    # All secrets (API keys, passwords, etc.) are stored in AWS Secrets Manager.
    # The application reads this .env file and then fetches secrets from
    # Secrets Manager using the SECRET_NAME variable.
    #
    # Contents of auto-generated .env:
    # - FLASK_ENV: Environment mode (development/production)
    # - SECRET_KEY: Flask session key (auto-generated, persisted)
    # - PORT/HOST: Server settings
    # - SECRET_NAME: Points to AWS Secrets Manager secret
    # - AWS_REGION: AWS region (from vault.yml)
    # - S3_BUCKET/FOLDER: S3 configuration (from vault.yml)
    # - EBAY_VERIFICATION_TOKEN: eBay compliance token (auto-generated, persisted)
    #
    # What is NOT in .env:
    # - AWS credentials (IAM role provides access)
    # - eBay API credentials (from Secrets Manager)
    # - Application passwords (from Secrets Manager)
    # - Any sensitive data (all in Secrets Manager)
    # =========================================================================
    - name: Create .env file from template
      template:
        src: ../templates/env.j2
        dest: "{{ app_dir }}/.env"
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: '0600'

    - name: Create supervisor configuration
      template:
        src: ../templates/supervisor.conf.j2
        dest: /etc/supervisor/conf.d/{{ service_name }}.conf
        mode: '0644'
      notify: restart supervisor

    - name: Create nginx site configuration
      template:
        src: ../templates/nginx.conf.j2
        dest: /etc/nginx/sites-available/{{ service_name }}
        mode: '0644'
      notify: restart nginx

    - name: Enable nginx site
      file:
        src: /etc/nginx/sites-available/{{ service_name }}
        dest: /etc/nginx/sites-enabled/{{ service_name }}
        state: link
      notify: restart nginx

    - name: Remove default nginx site
      file:
        path: /etc/nginx/sites-enabled/default
        state: absent
      notify: restart nginx

    - name: Install logrotate configuration
      template:
        src: ../templates/logrotate.conf.j2
        dest: /etc/logrotate.d/{{ app_name }}
        mode: '0644'
        owner: root
        group: root

    - name: Verify logrotate configuration syntax
      command: logrotate -d /etc/logrotate.d/{{ app_name }}
      changed_when: false
      failed_when: false

    - name: Create scripts directory
      file:
        path: "{{ app_dir }}/scripts"
        state: directory
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: '0755'

    - name: Copy backup cleanup script
      copy:
        src: "{{ playbook_dir }}/../files/cleanup_old_backups.py"
        dest: "{{ app_dir }}/scripts/cleanup_old_backups.py"
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: '0755'
        remote_src: no

    - name: Create daily cron job for backup cleanup
      cron:
        name: "Cleanup old backups (>{{ backup_retention_days }} days)"
        minute: "{{ backup_cleanup_minute }}"
        hour: "{{ backup_cleanup_hour }}"
        job: "cd {{ app_dir }} && {{ venv_dir }}/bin/python {{ app_dir }}/scripts/cleanup_old_backups.py >> {{ log_dir }}/cleanup.log 2>&1"
        user: "{{ app_user }}"
        state: present

    - name: Apply security permissions
      import_tasks: tasks/harden-permissions.yml

    - name: Ensure supervisor is running
      service:
        name: supervisor
        state: started
        enabled: yes

    - name: Ensure nginx is running
      service:
        name: nginx
        state: started
        enabled: yes

    - name: Reread supervisor configuration
      command: supervisorctl reread
      register: supervisor_reread
      failed_when: false

    - name: Update supervisor with new configuration
      command: supervisorctl update
      register: supervisor_update
      failed_when: false

    - name: Check if service exists in supervisor
      command: supervisorctl status {{ service_name }}
      register: supervisor_status
      failed_when: false
      changed_when: false

    - name: Start application via supervisor
      supervisorctl:
        name: "{{ service_name }}"
        state: started
      when: supervisor_status.rc == 0 or supervisor_status.rc == 3

    - name: Restart supervisor if service not found
      service:
        name: supervisor
        state: restarted
      when: supervisor_status.rc != 0 and supervisor_status.rc != 3

    - name: Wait for supervisor to restart
      wait_for:
        path: /var/run/supervisor.sock
        state: present
        timeout: 30
      when: supervisor_status.rc != 0 and supervisor_status.rc != 3

    - name: Start application after supervisor restart
      supervisorctl:
        name: "{{ service_name }}"
        state: started
      when: supervisor_status.rc != 0 and supervisor_status.rc != 3

    # =========================================================================
    # EBS Volume Mounting (Optional - if enable_ebs_volume is true)
    # =========================================================================
    # This section handles attaching, formatting, and mounting the EBS volume
    # Only runs if enable_ebs_volume is true in group_vars/all.yml

    - name: Check if EBS volume is attached
      block:
        - name: List available block devices
          command: lsblk --raw --noheadings --output NAME,SIZE,TYPE
          register: lsblk_output
          changed_when: false

        - name: Find EBS volume device
          set_fact:
            ebs_device_found: "{{ lsblk_output.stdout_lines | select('match', '.*xvdf.*') | list }}"
          when: enable_ebs_volume | bool

        - name: Check if mount point exists
          stat:
            path: "{{ ebs_volume_mount_path }}"
          register: mount_point
          when: enable_ebs_volume | bool

        - name: Create mount point directory
          file:
            path: "{{ ebs_volume_mount_path }}"
            state: directory
            owner: "{{ admin_user }}"
            group: "{{ admin_user }}"
            mode: '0755'
          when: enable_ebs_volume | bool and not mount_point.stat.exists

        - name: Check if EBS volume needs formatting
          command: blkid {{ ebs_device_name }}1
          register: blkid_check
          failed_when: false
          changed_when: false
          when: enable_ebs_volume | bool and ebs_device_found

        - name: Create filesystem on EBS volume
          command: mkfs.xfs -f "{{ ebs_device_name }}1"
          when: enable_ebs_volume | bool and ebs_device_found and blkid_check.rc != 0

        - name: Get UUID of EBS volume
          command: blkid -s UUID -o value "{{ ebs_device_name }}1"
          register: ebs_uuid
          changed_when: false
          when: enable_ebs_volume | bool and ebs_device_found

        - name: Add EBS volume to /etc/fstab
          mount:
            path: "{{ ebs_volume_mount_path }}"
            src: "UUID={{ ebs_uuid.stdout }}"
            fstype: xfs
            opts: defaults,nofail
            state: present
          when: enable_ebs_volume | bool and ebs_device_found

        - name: Mount EBS volume
          command: mount "{{ ebs_volume_mount_path }}"
          when: enable_ebs_volume | bool and ebs_device_found and not mount_point.stat.exists

        - name: Set EBS mount point permissions
          file:
            path: "{{ ebs_volume_mount_path }}"
            owner: "{{ admin_user }}"
            group: "{{ admin_user }}"
            mode: '0755'
            state: directory
          when: enable_ebs_volume | bool

        - name: Display EBS volume information
          debug:
            msg:
              - "✓ EBS Volume Information:"
              - "  Device: {{ ebs_device_name }}1"
              - "  Mount Path: {{ ebs_volume_mount_path }}"
              - "  Size: {{ ebs_volume_size }} GB"
              - "  Type: {{ ebs_volume_type }}"
              - "  Encrypted: {{ ebs_volume_encrypted }}"
              - "  UUID: {{ ebs_uuid.stdout }}"
          when: enable_ebs_volume | bool and ebs_device_found
      when: enable_ebs_volume | bool

  handlers:
    - name: restart supervisor
      service:
        name: supervisor
        state: restarted

    - name: restart nginx
      service:
        name: nginx
        state: restarted

    - name: restart application
      supervisorctl:
        name: "{{ service_name }}"
        state: restarted
