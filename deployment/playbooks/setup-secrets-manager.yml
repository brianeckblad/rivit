---
# Playbook to create and configure AWS Secrets Manager secret
# Single purpose: Create secret and sync from Ansible Vault
#
# Note: IAM role must already have Secrets Manager permissions (see create-iam-role.yml)
#
# Usage: ansible-playbook playbooks/setup-secrets-manager.yml

- name: Setup AWS Secrets Manager
  hosts: localhost
  gather_facts: no

  tasks:
    - name: Read vault file
      command: ansible-vault view {{ playbook_dir }}/../group_vars/production/vault.yml --vault-password-file ~/.vault_pass
      register: vault_contents
      changed_when: false

    - name: Extract secrets from vault
      set_fact:
        vault_secrets: {}

    - name: Parse vault secrets
      set_fact:
        vault_secrets: "{{ vault_secrets | combine({item.split(':')[0].replace('vault_', ''): item.split(':')[1] | trim}) }}"
      loop: "{{ vault_contents.stdout_lines }}"
      when:
        - item is search('^vault_')
        - not item is search('_new:')
        - ':' in item

    - name: Create Secrets Manager secret
      command: >
        aws secretsmanager create-secret
        --name {{ app_name }}/production
        --description "Secrets for {{ app_display_name }} production environment"
        --secret-string '{}'
        --region {{ aws_region }}
      register: secret_create
      failed_when: false
      changed_when: secret_create.rc == 0

    - name: Get secret ARN
      command: >
        aws secretsmanager describe-secret
        --secret-id {{ app_name }}/production
        --query 'ARN'
        --output text
        --region {{ aws_region }}
      register: secret_arn
      changed_when: false

    - name: Update secret with vault contents
      command: >
        aws secretsmanager update-secret
        --secret-id {{ app_name }}/production
        --secret-string '{{ vault_secrets | to_json }}'
        --region {{ aws_region }}

    - name: Enable automatic rotation (optional)
      command: >
        aws secretsmanager rotate-secret
        --secret-id {{ app_name }}/production
        --rotation-rules AutomaticallyAfterDays=30
        --region {{ aws_region }}
      register: rotation_result
      failed_when: false
      changed_when: rotation_result.rc == 0

    - name: Tag secret
      command: >
        aws secretsmanager tag-resource
        --secret-id {{ app_name }}/production
        --tags Key=Application,Value={{ app_name }} Key=Environment,Value=production Key=ManagedBy,Value=Ansible
        --region {{ aws_region }}
      failed_when: false

    - name: Display Secrets Manager information
      debug:
        msg:
          - "✓ AWS Secrets Manager configured"
          - "Secret Name: {{ app_name }}/production"
          - "Secret ARN: {{ secret_arn.stdout }}"
          - "Region: {{ aws_region }}"
          - ""
          - "Secrets stored: {{ vault_secrets.keys() | list | length }}"
          - "Keys: {{ vault_secrets.keys() | list }}"
          - ""
          - "Rotation: {{ 'Enabled (30 days)' if rotation_result.rc == 0 else 'Not configured' }}"
          - ""
          - "Note: IAM role {{ app_name }}-ec2-role should already have access"
          - "(configured in create-iam-role.yml)"

    - name: Save Secrets Manager info
      copy:
        content: |
          AWS Secrets Manager Configuration
          Created: {{ ansible_date_time.iso8601 }}
          
          Secret Name: {{ app_name }}/production
          Secret ARN: {{ secret_arn.stdout }}
          Region: {{ aws_region }}
          
          Secrets stored: {{ vault_secrets.keys() | list | length }}
          Keys: {{ vault_secrets.keys() | list | join(', ') }}
          
          Rotation: {{ 'Enabled (30 days automatic)' if rotation_result.rc == 0 else 'Manual only' }}
          
          Access from EC2:
          aws secretsmanager get-secret-value \
            --secret-id {{ app_name }}/production \
            --query SecretString \
            --output text
          
          Or in Python:
          import boto3
          import json
          client = boto3.client('secretsmanager', region_name='{{ aws_region }}')
          response = client.get_secret_value(SecretId='{{ app_name }}/production')
          secrets = json.loads(response['SecretString'])
          
          IAM Role Access: {{ app_name }}-ec2-role has read access
          (configured in create-iam-role.yml)
        dest: "{{ playbook_dir }}/../secrets-manager-info.txt"

