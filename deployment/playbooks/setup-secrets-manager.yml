---
# Playbook to create and configure AWS Secrets Manager secret
# Single purpose: Create secret and sync from Ansible Vault
#
# Usage: ansible-playbook playbooks/setup-secrets-manager.yml \
#          --vault-password-file ~/.vault_pass
#
# IMPORTANT: This playbook requires vault.yml decryption.
# Provide vault password via:
# 1. ~/.vault_pass file (recommended), OR
# 2. --ask-vault-pass flag (will prompt for password)
#
# Note: IAM role must already have Secrets Manager permissions (see create-iam-policies.yml)

- name: Setup AWS Secrets Manager
  hosts: localhost
  gather_facts: no
  vars_files:
    - ../group_vars/all.yml
    - ../group_vars/vault.yml
  vars:
    # Build the Secrets Manager payload automatically from vault variables.
    # Key names are UPPERCASED to match config.py get_secret() calls.
    # To add a new secret: just add the variable to vault.yml.
    aws_secrets:
      SECRET_KEY: "{{ secret_key }}"
      S3_BUCKET_NAME: "{{ s3_bucket_name }}"
      S3_FOLDER: "{{ s3_folder }}"
      AWS_REGION: "{{ aws_region }}"
      SNS_TOPIC_ARN: "{{ sns_topic_arn | default('') }}"
      APP_DEFAULT_USERNAME: "{{ app_default_username }}"
      APP_DEFAULT_PASSWORD: "{{ app_default_password }}"
      USERS: "{{ users }}"
      CLOUDFRONT_DOMAIN: "{{ cloudfront_domain | default('') }}"
      APP_SECRET_TOKEN: "{{ app_secret_token | default('') }}"
      EBAY_ENVIRONMENT: "{{ ebay_environment | default('production') }}"
      EBAY_VERIFICATION_TOKEN: "{{ ebay_verification_token | default('') }}"
      EBAY_PRODUCTION_APP_ID: "{{ ebay_production_app_id | default('') }}"
      EBAY_PRODUCTION_CERT_ID: "{{ ebay_production_cert_id | default('') }}"
      EBAY_PRODUCTION_DEV_ID: "{{ ebay_production_dev_id | default('') }}"
      EBAY_PRODUCTION_TOKEN: "{{ ebay_production_token | default('') }}"
      EBAY_SANDBOX_APP_ID: "{{ ebay_sandbox_app_id | default('') }}"
      EBAY_SANDBOX_CERT_ID: "{{ ebay_sandbox_cert_id | default('') }}"
      EBAY_SANDBOX_DEV_ID: "{{ ebay_sandbox_dev_id | default('') }}"
      EBAY_SANDBOX_TOKEN: "{{ ebay_sandbox_token | default('') }}"

  tasks:
    - name: Create Secrets Manager secret
      shell: |
        set -e
        echo "Creating secret: {{ secret_name }}" >&2
        echo "Region: {{ aws_region }}" >&2
        aws secretsmanager create-secret \
          --name {{ secret_name }} \
          --description "Secrets for {{ app_display_name }} production environment" \
          --secret-string '{}' \
          --region {{ aws_region }} 2>&1
      register: secret_create
      failed_when: secret_create.rc != 0 and "already exists" not in secret_create.stdout
      changed_when: secret_create.rc == 0
      no_log: false

    - name: Update secret with vault contents
      community.aws.secretsmanager_secret:
        name: "{{ secret_name }}"
        secret: "{{ aws_secrets | to_json }}"
        region: "{{ aws_region }}"
      register: secret_info
      changed_when: true

    - name: Enable automatic rotation (optional)
      shell: |
        aws secretsmanager rotate-secret \
          --secret-id {{ secret_name }} \
          --rotation-rules AutomaticallyAfterDays=30 \
          --region {{ aws_region }}
      register: rotation_result
      failed_when: false
      changed_when: rotation_result.rc == 0

    - name: Tag secret
      shell: |
        aws secretsmanager tag-resource \
          --secret-id {{ secret_name }} \
          --tags Key=Application,Value={{ app_name }} Key=Environment,Value=production Key=ManagedBy,Value=Ansible \
          --region {{ aws_region }}
      failed_when: false
      changed_when: true

    - name: Display Secrets Manager information
      debug:
        msg:
          - "✓ AWS Secrets Manager configured"
          - "Secret Name: {{ secret_name }}"
          - "Secret ARN: {{ secret_info.secret.arn | default('N/A') }}"
          - "Region: {{ aws_region }}"
          - "Secrets stored: {{ aws_secrets | length }}"
          - "Rotation: {{ 'Enabled (30 days)' if rotation_result.rc == 0 else 'Not configured' }}"
          - ""
          - "Note: The server's IAM role must have Secrets Manager access."
          - "(Configured by create-iam-policies.yml)"


