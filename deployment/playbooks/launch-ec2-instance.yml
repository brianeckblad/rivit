---
# Playbook to launch EC2 instance
# Single purpose: Launch EC2 instance with existing IAM role, security group, and SSH key
#
# Prerequisites:
#   - IAM role created (create-iam-role.yml)
#   - Security group created (create-security-group.yml)
#   - SSH key created (create-ssh-key.yml)
#
# Usage: ansible-playbook playbooks/launch-ec2-instance.yml

- name: Launch EC2 Instance
  hosts: localhost
  gather_facts: no
  vars_files:
    - ../group_vars/all.yml
    - ../group_vars/vault.yml

  vars:
    instance_type: "{{ ec2_instance_type | default('t3.micro') }}"
    ami_owner: "099720109477"  # Canonical (Ubuntu)
    ami_name: "ubuntu/images/hvm-ssd/ubuntu-jammy-22.04-amd64-server-*"

  tasks:
    - name: Validate instance type is Nitro (t3 family)
      fail:
        msg: "Only t3 instances are supported (Nitro/Intel/NVMe). Got: {{ instance_type }}"
      when: not instance_type.startswith('t3.')

    - name: Remove stale instance-info.txt from previous launch
      file:
        path: "{{ playbook_dir }}/../instance-info.txt"
        state: absent

    - name: Get latest Ubuntu 22.04 AMI
      amazon.aws.ec2_ami_info:
        region: "{{ aws_region }}"
        owners: "{{ ami_owner }}"
        filters:
          name: "{{ ami_name }}"
      register: amis

    - name: Set AMI details (latest)
      set_fact:
        ami_id: "{{ (amis.images | sort(attribute='creation_date') | last).image_id }}"
        ami_root_device: "{{ (amis.images | sort(attribute='creation_date') | last).root_device_name }}"

    - name: Build EBS volumes list
      set_fact:
        instance_volumes:
          # Root volume — OS boot disk
          - device_name: "{{ ami_root_device }}"
            ebs:
              volume_size: 8
              volume_type: "gp3"
              delete_on_termination: "{{ ebs_boot_delete_on_termination }}"
          # Data volume — mounted at /home, application data
          - device_name: "{{ ebs_device_name }}"
            ebs:
              volume_size: "{{ ebs_volume_size }}"
              volume_type: "{{ ebs_volume_type }}"
              delete_on_termination: "{{ ebs_data_delete_on_termination }}"
              encrypted: "{{ ebs_volume_encrypted }}"
              snapshot_id: "{{ ebs_volume_snapshot_id if ebs_volume_snapshot_id else omit }}"

    - name: Launch EC2 instance
      amazon.aws.ec2_instance:
        name: "{{ app_name }}"
        instance_type: "{{ instance_type }}"
        image_id: "{{ ami_id }}"
        region: "{{ aws_region }}"
        key_name: "{{ app_name }}-key"
        security_group: "{{ app_name }}-sg"
        iam_instance_profile: "{{ app_name }}-instance-profile"
        volumes: "{{ instance_volumes }}"

        # Networking Configuration
        network:
          assign_public_ip: "{{ assign_public_ip }}"

        # Monitoring & Detailed Metrics
        detailed_monitoring: "{{ ec2_monitoring_enabled }}"

        # Termination Protection
        termination_protection: "{{ ec2_termination_protection }}"

        # EBS Optimization
        ebs_optimized: "{{ ec2_ebs_optimized }}"


        # Network Security
        source_dest_check: "{{ ec2_source_dest_check }}"

        wait: yes
        wait_timeout: 300

        tags:
          Name: "{{ app_name }}"
          Application: "{{ app_name }}"
          Environment: production
          ManagedBy: Ansible
          EBSVolume: "Mandatory"
          AppStorageMount: "{{ app_storage_mount_path }}"
          CreatedDate: "{{ now(utc=true, fmt='%Y-%m-%dT%H:%M:%SZ') }}"
          LaunchMethod: Ansible
          PublicIP: "{{ 'Yes' if assign_public_ip else 'No' }}"
          Monitoring: "{{ 'Enabled' if ec2_monitoring_enabled else 'Disabled' }}"
          TerminationProtection: "{{ 'Yes' if ec2_termination_protection else 'No' }}"
      register: ec2

    - name: Get instance details
      set_fact:
        instance_ip: "{{ ec2.instances[0].public_ip_address }}"
        instance_id: "{{ ec2.instances[0].instance_id }}"
        private_ip: "{{ ec2.instances[0].private_ip_address }}"
        vpc_id: "{{ ec2.instances[0].vpc_id }}"
        subnet_id: "{{ ec2.instances[0].subnet_id }}"
        security_groups: "{{ ec2.instances[0].security_groups | map(attribute='group_name') | list }}"
        monitoring_state: "{{ ec2.instances[0].monitoring.state | default('disabled') }}"
        instance_state: "{{ ec2.instances[0].state.name }}"

    # -----------------------------------------------------------------
    # Tag EBS volumes with distinct names so they are identifiable
    # in the AWS console:  {app_name}-boot  /  {app_name}-data
    # -----------------------------------------------------------------
    - name: Get root volume ID
      shell: >
        aws ec2 describe-volumes
        --region {{ aws_region }}
        --filters
        "Name=attachment.instance-id,Values={{ instance_id }}"
        "Name=attachment.device,Values={{ ami_root_device }}"
        --query "Volumes[0].VolumeId"
        --output text
      register: root_vol
      changed_when: false

    - name: Get data volume ID
      shell: >
        aws ec2 describe-volumes
        --region {{ aws_region }}
        --filters
        "Name=attachment.instance-id,Values={{ instance_id }}"
        "Name=attachment.device,Values={{ ebs_device_name }}"
        --query "Volumes[0].VolumeId"
        --output text
      register: data_vol
      changed_when: false

    - name: Tag root volume (boot)
      amazon.aws.ec2_tag:
        region: "{{ aws_region }}"
        resource: "{{ root_vol.stdout }}"
        tags:
          Name: "{{ app_name }}-boot"
          Application: "{{ app_name }}"
          Role: boot
          ManagedBy: Ansible
      when: root_vol.stdout != "None"

    - name: Tag data volume (data)
      amazon.aws.ec2_tag:
        region: "{{ aws_region }}"
        resource: "{{ data_vol.stdout }}"
        tags:
          Name: "{{ app_name }}-data"
          Application: "{{ app_name }}"
          Role: data
          MountPoint: "{{ ebs_volume_mount_path }}"
          DeleteOnTermination: "{{ ebs_data_delete_on_termination | string }}"
          ManagedBy: Ansible
      when: data_vol.stdout != "None"

    - name: Wait for SSH to become available
      wait_for:
        host: "{{ instance_ip }}"
        port: 22
        delay: 30
        timeout: 300
        state: started

    - name: Display comprehensive instance information
      debug:
        msg:
          - ""
          - "╔════════════════════════════════════════════════════════════╗"
          - "║                                                            ║"
          - "║   ✓ EC2 Instance Created Successfully                     ║"
          - "║                                                            ║"
          - "╚════════════════════════════════════════════════════════════╝"
          - ""
          - "INSTANCE DETAILS:"
          - "  Instance ID:          {{ instance_id }}"
          - "  Instance Name:        {{ app_name }}"
          - "  Instance Type:        {{ instance_type }}"
          - "  Instance State:       {{ instance_state }}"
          - "  Availability Zone:    {{ ec2.instances[0].placement.availability_zone }}"
          - ""
          - "NETWORKING:"
          - "  Public IP Address:    {{ instance_ip }}"
          - "  Private IP Address:   {{ private_ip }}"
          - "  VPC ID:               {{ vpc_id }}"
          - "  Subnet ID:            {{ subnet_id }}"
          - "  Security Groups:      {{ security_groups | join(', ') }}"
          - ""
          - "SSH ACCESS:"
          - "  SSH Key:              ~/.ssh/{{ app_name }}-key.pem"
          - "  SSH Command:          ssh -i ~/.ssh/{{ app_name }}-key.pem ubuntu@{{ instance_ip }}"
          - "  SSH Port:             22"
          - ""
          - "STORAGE CONFIGURATION:"
          - "  Root Volume ({{ app_name }}-boot):"
          - "    Volume ID:            {{ root_vol.stdout }}"
          - "    Size:                 8 GB gp3"
          - "    Delete on Termination: {{ ebs_boot_delete_on_termination }} {{ '— deleted with instance' if ebs_boot_delete_on_termination else '✓ PROTECTED' }}"
          - ""
          - "  Data Volume ({{ app_name }}-data):"
          - "    Volume ID:            {{ data_vol.stdout }}"
          - "    Device Name:          /dev/sdf (appears as /dev/nvme1n1 on instance)"
          - "    Size:                 {{ ebs_volume_size }} GB"
          - "    Type:                 {{ ebs_volume_type }}"
          - "    Encrypted:            {{ ebs_volume_encrypted }}"
          - "    Mount Point:          {{ ebs_volume_mount_path }}"
          - "    App Directory:        {{ app_storage_mount_path }}"
          - "    Delete on Termination: {{ ebs_data_delete_on_termination }} {{ '⚠️  volume will be deleted with instance!' if ebs_data_delete_on_termination else '✓ PROTECTED — volume survives instance termination' }}"
          - ""
          - "  IMPORTANT:"
          - "    EBS volume replaces /home — all user home dirs and app data persist"
          - "    Application directory: {{ app_storage_mount_path }}"
          - "      - Application code, Python venv, logs, instance data"
          - ""
          - "MONITORING:"
          - "  CloudWatch:           {{ 'Enabled (detailed)' if monitoring_state == 'enabled' else 'Disabled (basic)' }}"
          - "  Termination Protect:  {{ 'Enabled' if ec2_termination_protection else 'Disabled' }}"
          - ""
          - "NEXT STEPS:"
          - "  1. Inventory auto-updated: ansible_host={{ instance_ip }}"
          - "  2. Prepare server: ansible-playbook playbooks/setup-server.yml"
          - "  3. Deploy app:     ansible-playbook playbooks/setup.yml"
          - "  4. Application will be available at: http://{{ instance_ip }}"
          - ""

    - name: Save comprehensive instance information to file
      copy:
        content: |
          ╔════════════════════════════════════════════════════════════╗
          ║                                                            ║
          ║        EC2 INSTANCE INFORMATION - {{ app_name }}
          ║                                                            ║
          ╚════════════════════════════════════════════════════════════╝
          
          CREATED: {{ now(utc=true, fmt='%Y-%m-%dT%H:%M:%SZ') }}
          
          ════════════════════════════════════════════════════════════
          INSTANCE DETAILS
          ════════════════════════════════════════════════════════════
          
          Instance ID:              {{ instance_id }}
          Instance Name:            {{ app_name }}
          Instance Type:            {{ instance_type }}
          Instance State:           {{ instance_state }}
          Availability Zone:        {{ ec2.instances[0].placement.availability_zone }}
          Region:                   {{ aws_region }}
          
          AMI ID:                   {{ ami_id }}
          Launch Time:              {{ now(utc=true, fmt='%Y-%m-%dT%H:%M:%SZ') }}
          
          ════════════════════════════════════════════════════════════
          NETWORKING
          ════════════════════════════════════════════════════════════
          
          Public IP Address:        {{ instance_ip }}
          Private IP Address:       {{ private_ip }}
          VPC ID:                   {{ vpc_id }}
          Subnet ID:                {{ subnet_id }}
          
          Assign Public IP:         Yes
          Source/Dest Check:        Enabled
          
          ════════════════════════════════════════════════════════════
          SECURITY
          ════════════════════════════════════════════════════════════
          
          Security Groups:          {{ security_groups | join(', ') }}
          SSH Key Name:             {{ app_name }}-key
          SSH Key Location:         ~/.ssh/{{ app_name }}-key.pem
          SSH Key Permissions:      0400 (read-only)
          IAM Instance Role:        {{ app_name }}-ec2-role
          
          ════════════════════════════════════════════════════════════
          STORAGE CONFIGURATION
          ════════════════════════════════════════════════════════════
          
          Root Volume ({{ app_name }}-boot):
            Volume ID:              {{ root_vol.stdout }}
            Device Name:            /dev/sda1
            Size:                   8 GB
            Type:                   gp3
            Delete on Termination:  {{ ebs_boot_delete_on_termination }}
          
          {% if ebs_volume_size is defined %}
          Data Volume ({{ app_name }}-data):
            Volume ID:              {{ data_vol.stdout }}
            Device Name:            /dev/sdf (appears as /dev/nvme1n1)
            Size:                   {{ ebs_volume_size }} GB
            Type:                   {{ ebs_volume_type }}
            Encrypted:              {{ ebs_volume_encrypted }}
            Mount Path:             {{ ebs_volume_mount_path }}
            App Directory:          {{ app_storage_mount_path }}
            Delete on Termination:  {{ ebs_data_delete_on_termination }}
          {% endif %}
          
          ════════════════════════════════════════════════════════════
          MONITORING & MANAGEMENT
          ════════════════════════════════════════════════════════════
          
          CloudWatch Monitoring:    {{ 'Enabled (detailed metrics)' if ec2_monitoring_enabled else 'Disabled (basic metrics)' }}
          Termination Protection:   {{ 'Enabled' if ec2_termination_protection else 'Disabled' }}
          EBS Optimization:         {{ 'Enabled' if ec2_ebs_optimized else 'Disabled' }}
          Public IP Assignment:     {{ 'Enabled' if assign_public_ip else 'Disabled' }}
          Source/Dest Check:        {{ 'Enabled' if ec2_source_dest_check else 'Disabled' }}
          
          ════════════════════════════════════════════════════════════
          SSH ACCESS INFORMATION
          ════════════════════════════════════════════════════════════
          
          SSH User:                 ubuntu
          SSH Port:                 22
          SSH Key File:             ~/.ssh/{{ app_name }}-key.pem
          
          Quick SSH Access:
            ssh -i ~/.ssh/{{ app_name }}-key.pem ubuntu@{{ instance_ip }}
          
          Copy SSH Key (if on different machine):
            scp -i ~/old-key.pem ubuntu@{{ instance_ip }}:~/.ssh/authorized_keys .
          
          ════════════════════════════════════════════════════════════
          APPLICATION ACCESS
          ════════════════════════════════════════════════════════════
          
          HTTP Access:              http://{{ instance_ip }}
          HTTPS Access:             https://{{ instance_ip }} (self-signed)
          
          Health Check:             http://{{ instance_ip }}/health
          
          ════════════════════════════════════════════════════════════
          DEPLOYMENT STEPS
          ════════════════════════════════════════════════════════════
          
          1. VERIFY SSH ACCESS
             ssh -i ~/.ssh/{{ app_name }}-key.pem ubuntu@{{ instance_ip }}
          
          2. PREPARE SERVER (system packages, EBS mount, app user)
             Inventory was auto-updated with the server IP.
             ansible-playbook playbooks/setup-server.yml
          
          3. DEPLOY APPLICATION (code, venv, nginx, supervisor)
             ansible-playbook playbooks/setup.yml
          
          3. VERIFY APPLICATION
             curl http://{{ instance_ip }}
              
             Check logs:
             ssh ubuntu@{{ instance_ip }} 'sudo journalctl -u {{ app_name }} -n 50'
          
          4. CONFIGURE DNS (if using domain)
             Point your domain to: {{ instance_ip }}
             Then run: ansible-playbook playbooks/setup-ssl.yml
          
          ════════════════════════════════════════════════════════════
          USEFUL AWS CLI COMMANDS
          ════════════════════════════════════════════════════════════
          
          Get instance details:
            aws ec2 describe-instances --instance-ids {{ instance_id }} --region {{ aws_region }}
          
          Connect via AWS Systems Manager (no SSH key needed):
            aws ssm start-session --target {{ instance_id }} --region {{ aws_region }}
          
          View console output:
            aws ec2 get-console-output --instance-id {{ instance_id }} --region {{ aws_region }}
          
          Stop instance:
            aws ec2 stop-instances --instance-ids {{ instance_id }} --region {{ aws_region }}
          
          Start instance:
            aws ec2 start-instances --instance-ids {{ instance_id }} --region {{ aws_region }}
          
          Terminate instance (DELETE):
            aws ec2 terminate-instances --instance-ids {{ instance_id }} --region {{ aws_region }}
          
          Enable termination protection:
            aws ec2 modify-instance-attribute --instance-id {{ instance_id }} --disable-api-termination --region {{ aws_region }}
          
          ════════════════════════════════════════════════════════════
          IMPORTANT NOTES
          ════════════════════════════════════════════════════════════
          
          • SSH key file ({{ app_name }}-key.pem) is CRITICAL - DO NOT LOSE IT
          • The key is stored locally only - AWS doesn't have a copy
          • You cannot recover a lost SSH key
          • For production, enable termination protection
          • For production, use a custom domain with SSL certificate
          • Review security group rules in AWS Console
          • Set up CloudWatch alarms for monitoring
          • Enable detailed monitoring for high-traffic applications
          
          ════════════════════════════════════════════════════════════
          STATUS CHECK
          ════════════════════════════════════════════════════════════
          
          Check AWS Console > EC2 > Instances for status checks:
            - System Status Check: Should pass in ~1 minute
            - Instance Status Check: Should pass in ~1 minute
          
          If status checks fail, terminate and relaunch.
          
          ════════════════════════════════════════════════════════════
          RESOURCE COST ESTIMATES
          ════════════════════════════════════════════════════════════
          
          EC2 Instance ({{ instance_type }}):    ~$0.01 - $0.10/hour
          Root Volume (8 GB gp3):                ~$1/month
          {% if ebs_volume_size is defined %}
          Data Volume ({{ ebs_volume_size }} GB {{ ebs_volume_type }}):     ~${{ (ebs_volume_size * 0.10) | int }}/month
          {% endif %}
          CloudWatch Monitoring:                 ~$0.30/month
          
          Total Estimated Monthly Cost: $5-50 (varies by usage)
          
          For detailed pricing, visit: https://aws.amazon.com/ec2/pricing/
          
          ════════════════════════════════════════════════════════════
        dest: "{{ playbook_dir }}/../instance-info.txt"

    - name: Remove stale instance-info backup files
      shell: "rm -f {{ playbook_dir }}/../instance-info.txt.*~"
      changed_when: false

    - name: Update inventory file — set server IP and SSH connection
      copy:
        content: |
          # ============================================================================
          # Server Inventory — AUTO-GENERATED by launch-ec2-instance.yml
          # ============================================================================
          # Last updated: {{ now(utc=true, fmt='%Y-%m-%dT%H:%M:%SZ') }}
          # Server IP: {{ instance_ip }}
          #
          # This file is gitignored. The template is hosts.yml.example.
          #
          # Playbook targeting:
          #   hosts: localhost    → AWS API calls (create/delete resources)
          #   hosts: all          → Remote server (setup, update, deploy)
          #   hosts: app_servers  → Remote server (permissions, hardening)
          #   hosts: production   → Remote server (monitoring, SSL)

          all:
            children:
              app_servers:
                children:
                  production:
                    hosts:
                      server:
                        ansible_host: {{ instance_ip }}
                        ansible_connection: ssh
                        ansible_user: ubuntu
                        ansible_ssh_private_key_file: ~/.ssh/{{ app_name }}-key.pem

            vars:
              ansible_user: ubuntu
              ansible_python_interpreter: /usr/bin/python3
        dest: "{{ playbook_dir }}/../inventories/hosts.yml"

    - name: Remove stale inventory backup files
      shell: "rm -f {{ playbook_dir }}/../inventories/hosts.yml.*~"
      changed_when: false

    # =========================================================================
    # POST-LAUNCH VALIDATION
    # =========================================================================
    # Automatically verify the instance is healthy and all prerequisites
    # are working before the user runs setup.yml.

    - name: Validate SSH connectivity
      command: >
        ssh -o StrictHostKeyChecking=no -o ConnectTimeout=15
        -i ~/.ssh/{{ app_name }}-key.pem
        ubuntu@{{ instance_ip }} echo "SSH_OK"
      register: ssh_check
      retries: 3
      delay: 10
      until: ssh_check.rc == 0
      changed_when: false

    - name: Validate EBS data volume is visible on instance
      command: >
        ssh -o StrictHostKeyChecking=no
        -i ~/.ssh/{{ app_name }}-key.pem
        ubuntu@{{ instance_ip }} test -b {{ ebs_nvme_device }}
      register: ebs_check
      failed_when: false
      changed_when: false

    - name: Validate IAM instance profile is attached
      command: >
        aws ec2 describe-instances
        --instance-ids {{ instance_id }}
        --region {{ aws_region }}
        --query "Reservations[0].Instances[0].IamInstanceProfile.Arn"
        --output text
      register: iam_check
      changed_when: false

    - name: Validate S3 bucket exists
      command: >
        aws s3api head-bucket
        --bucket {{ s3_bucket_name }}
        --region {{ aws_region }}
      register: s3_check
      failed_when: false
      changed_when: false

    - name: Validate security group ports
      shell: >
        aws ec2 describe-security-groups
        --group-names {{ app_name }}-sg
        --region {{ aws_region }}
        --query "SecurityGroups[0].IpPermissions[].FromPort"
        --output text
      register: sg_check
      changed_when: false

    - name: Display validation results
      debug:
        msg:
          - ""
          - "╔════════════════════════════════════════════════════════════╗"
          - "║               POST-LAUNCH VALIDATION                      ║"
          - "╚════════════════════════════════════════════════════════════╝"
          - ""
          - "  SSH Connectivity:    {{ '✓ Connected to ' + instance_ip if ssh_check.rc == 0 else '✗ FAILED — check security group port 22' }}"
          - "  EBS Data Volume:    {{ '✓ ' + ebs_nvme_device + ' detected' if ebs_check.rc == 0 else '✗ ' + ebs_nvme_device + ' NOT found — check volume attachment' }}"
          - "  IAM Instance Role:  {{ '✓ ' + (iam_check.stdout | trim) if 'instance-profile' in iam_check.stdout else '✗ No IAM role attached' }}"
          - "  S3 Bucket:          {{ '✓ ' + s3_bucket_name + ' accessible' if s3_check.rc == 0 else '✗ ' + s3_bucket_name + ' NOT accessible — check bucket exists' }}"
          - "  Security Group:     {{ '✓ Ports: ' + (sg_check.stdout | trim) if sg_check.rc == 0 else '✗ Could not read security group' }}"
          - ""
          - "  Inventory updated:  inventories/hosts.yml → {{ instance_ip }}"
          - "  Instance info:      instance-info.txt"
          - ""
          - "READY FOR SERVER SETUP:"
          - "  ansible-playbook playbooks/setup-server.yml --vault-password-file ~/.vault_pass"
          - ""
          - "THEN DEPLOY APPLICATION:"
          - "  ansible-playbook playbooks/setup.yml --vault-password-file ~/.vault_pass"
          - ""

