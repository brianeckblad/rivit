---
# Playbook to delete IAM role, all policies, and all instance profiles
# Counterpart to: create-iam-role.yml
#
# What gets removed (in order):
#   1. Inline policies (s3-access, secrets-access, cloudwatch-access)
#   2. Managed policy attachments (AmazonSSMManagedInstanceCore)
#   3. Instance profiles (current + any stale profiles from older deployments)
#   4. IAM role
#
# Usage: ansible-playbook playbooks/delete-iam-role.yml --vault-password-file ~/.vault_pass
#
# To recreate: ansible-playbook playbooks/create-iam-role.yml --vault-password-file ~/.vault_pass

- name: Delete IAM Role
  hosts: localhost
  gather_facts: no
  vars_files:
    - ../group_vars/all.yml
    - ../group_vars/vault.yml

  tasks:

    # ── Step 1: Remove inline policies ──────────────────────────────────────
    - name: "Step 1/4 — Delete inline policies from role"
      amazon.aws.iam_policy:
        iam_type: role
        iam_name: "{{ app_name }}-ec2-role"
        policy_name: "{{ item }}"
        state: absent
      loop:
        - "{{ app_name }}-s3-access"
        - "{{ app_name }}-secrets-access"
        - "{{ app_name }}-cloudwatch-access"
      failed_when: false

    # ── Step 2: Detach managed policies ─────────────────────────────────────
    - name: "Step 2/4 — Detach managed policies from role"
      command: >
        aws iam detach-role-policy
        --role-name {{ app_name }}-ec2-role
        --policy-arn {{ item }}
      loop:
        - "arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore"
      failed_when: false
      changed_when: false

    # ── Step 3: Remove all instance profiles ────────────────────────────────
    - name: "Step 3/4 — Delete instance profile (current naming)"
      amazon.aws.iam_instance_profile:
        name: "{{ app_name }}-instance-profile"
        state: absent
      failed_when: false

    - name: "Step 3/4 — Find any remaining instance profiles attached to role"
      command: >
        aws iam list-instance-profiles-for-role
        --role-name {{ app_name }}-ec2-role
        --query 'InstanceProfiles[].InstanceProfileName'
        --output text
      register: remaining_profiles
      failed_when: false
      changed_when: false

    - name: "Step 3/4 — Remove role from and delete stale instance profiles"
      shell: |
        aws iam remove-role-from-instance-profile \
          --instance-profile-name {{ item }} \
          --role-name {{ app_name }}-ec2-role 2>/dev/null
        aws iam delete-instance-profile \
          --instance-profile-name {{ item }} 2>/dev/null
      loop: "{{ remaining_profiles.stdout.split() | default([]) }}"
      when: remaining_profiles.rc == 0 and remaining_profiles.stdout | trim | length > 0
      failed_when: false

    # ── Step 4: Delete the role ─────────────────────────────────────────────
    - name: "Step 4/4 — Delete IAM role"
      amazon.aws.iam_role:
        name: "{{ app_name }}-ec2-role"
        state: absent
        create_instance_profile: false
        delete_instance_profile: false
      failed_when: false

    # ── Summary ─────────────────────────────────────────────────────────────
    - name: Display result
      debug:
        msg:
          - ""
          - "✓ IAM role deleted:           {{ app_name }}-ec2-role"
          - "✓ Instance profile deleted:   {{ app_name }}-instance-profile"
          - "✓ Inline policies deleted:    s3-access, secrets-access, cloudwatch-access"
          - "✓ Managed policies detached:  AmazonSSMManagedInstanceCore"
          - ""
          - "To recreate:"
          - "  ansible-playbook playbooks/create-iam-role.yml --vault-password-file ~/.vault_pass"

