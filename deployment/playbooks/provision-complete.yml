---
# Complete Deployment Orchestration Playbook
# Runs infrastructure provisioning, server prep (with hardening), app deploy (with SSL),
# plus optional monitoring
#
# Usage: ansible-playbook playbooks/provision-complete.yml
#
# What it does:
# 1. Provisions infrastructure (S3, IAM, SG, SSH, EC2, Secrets Manager, CloudFront)
# 2. Prepares server (system packages, app user, EBS mount, security hardening)
# 3. Deploys application (code, dependencies, Nginx, Supervisor, SSL certificate)
# 4. Configures monitoring and CloudWatch (if confirmed)

- name: Complete Deployment
  hosts: localhost
  gather_facts: yes
  vars_files:
    - ../group_vars/all.yml
    - ../group_vars/vault.yml

  vars_prompt:

    - name: setup_monitoring
      prompt: "Do you want to setup monitoring? (yes/no)"
      default: "yes"
      private: no

  tasks:
    - name: Display banner
      debug:
        msg:
          - "╔══════════════════════════════════════════════════════════╗"
          - "║   Complete Deployment                                    ║"
          - "║   {{ app_display_name }}                                ║"
          - "╚══════════════════════════════════════════════════════════╝"

    - name: Check prerequisites
      block:
        - name: Check AWS credentials
          command: aws sts get-caller-identity
          register: aws_check
          changed_when: false

        - name: Display AWS account
          debug:
            msg: "AWS Account: {{ (aws_check.stdout | from_json).Account }}"

        - name: Check app_name is configured
          fail:
            msg: "app_name must be set in group_vars/vault.yml (currently: {{ app_name }})"
          when: app_name == "CHANGEME" or app_name is not defined

        - name: Check S3 bucket is configured
          fail:
            msg: "s3_bucket_name must be set in group_vars/vault.yml"
          when: s3_bucket_name is not defined or s3_bucket_name == ""

# ========================================
# Phase 1: Provision Infrastructure
# ========================================

- name: Phase 1 - Provision Infrastructure
  import_playbook: provision-infrastructure.yml

# ========================================
# Phase 2: Prepare Server
# ========================================

- name: Phase 2 - Prepare Server
  import_playbook: setup-server.yml

# ========================================
# Phase 3: Deploy Application
# ========================================

- name: Phase 3 - Deploy Application
  import_playbook: setup.yml

# ========================================
# Phase 4: Setup Monitoring (Optional)
# ========================================

- name: Phase 4 - Setup Monitoring
  import_playbook: setup-monitoring.yml
  when: hostvars['localhost']['setup_monitoring'] | bool

# ========================================
# Summary
# ========================================

- name: Display Summary
  hosts: localhost
  gather_facts: no
  vars_files:
    - ../group_vars/all.yml
    - ../group_vars/vault.yml

  tasks:
    - name: Display completion summary
      debug:
        msg:
          - "╔══════════════════════════════════════════════════════════╗"
          - "║   Deployment Complete                                    ║"
          - "╚══════════════════════════════════════════════════════════╝"
          - ""
          - "Resources created:"
          - "  ✓ S3 Bucket: {{ s3_bucket_name }}"
          - "  ✓ IAM Role: {{ app_name }}-ec2-role"
          - "  ✓ Security Group: {{ app_name }}-sg"
          - "  ✓ SSH Key: ~/.ssh/{{ app_name }}-key.pem"
          - "  ✓ EC2 Instance: {{ app_name }}"
          - "  ✓ Secrets Manager: {{ secret_name }}"
          - "  ✓ Security Hardening: SSH lockdown, fail2ban, auto-updates, sysctl"
          - "  ✓ SSL Certificate: https://{{ server_name }}"
          - ""
          - "Application deployed and running over HTTPS."
          - ""
          - "Next steps:"
          - "  1. Test: curl https://{{ server_name }}"
          - "  2. Logs: ssh ubuntu@{{ server_name }} 'sudo supervisorctl status {{ service_name }}'"
          - ""
          - "Instance info saved to: deployment/instances/"
