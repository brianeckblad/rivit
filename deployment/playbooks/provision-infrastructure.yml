---
# Master orchestration playbook for complete infrastructure provisioning
# This calls individual single-purpose playbooks in the correct order
#
# Usage: ansible-playbook playbooks/provision-infrastructure.yml \
#          --vault-password-file ~/.vault_pass
#
# IMPORTANT: If vault.yml is encrypted, provide vault password via:
# 1. ~/.vault_pass file (recommended), OR
# 2. --ask-vault-pass flag (will prompt for password)
#
# Individual playbooks can also be run separately:
#   ansible-playbook playbooks/create-s3-bucket.yml --vault-password-file ~/.vault_pass
#   ansible-playbook playbooks/create-iam-role.yml --vault-password-file ~/.vault_pass
#   ansible-playbook playbooks/create-security-group.yml --vault-password-file ~/.vault_pass
#   ansible-playbook playbooks/create-ssh-key.yml
#   ansible-playbook playbooks/launch-ec2-instance.yml

- name: Display provisioning plan
  hosts: localhost
  vars_files:
    - ../group_vars/all.yml
    - ../group_vars/vault.yml
  gather_facts: no
  tasks:
    - name: Show what will be created
      debug:
        msg:
          - "╔══════════════════════════════════════════════════════════╗"
          - "║   Infrastructure Provisioning Plan                      ║"
          - "╚══════════════════════════════════════════════════════════╝"
          - ""
          - "This will create (in order):"
          - "  1. S3 bucket for application storage"
          - "  2. IAM role with policies (S3, Secrets Manager, CloudWatch)"
          - "  3. Security group (ports 22, 80, 443)"
          - "  4. SSH key pair"
          - "  5. EC2 instance (Ubuntu 22.04)"
          - "  6. Secrets Manager secret (synced from vault)"
          - "  7. CloudFront CDN: {{ 'YES' if (enable_cloudfront | default(false) | bool) else 'no (change enable_cloudfront in vault.yml to add later)' }}"
          - ""
          - "App: {{ app_display_name }}"
          - "Region: {{ aws_region }}"
          - ""
          - "Each component can be run individually if needed."

# ==============================================================================
# Step 1: Create S3 Bucket
# ==============================================================================

- name: Step 1 - Create S3 Bucket
  import_playbook: create-s3-bucket.yml

# ==============================================================================
# Step 2: Create IAM Role
# ==============================================================================

- name: Step 2 - Create IAM Role
  import_playbook: create-iam-role.yml

# ==============================================================================
# Step 3: Create Security Group
# ==============================================================================

- name: Step 3 - Create Security Group
  import_playbook: create-security-group.yml

# ==============================================================================
# Step 4: Create SSH Key
# ==============================================================================

- name: Step 4 - Create SSH Key
  import_playbook: create-ssh-key.yml

# ==============================================================================
# Step 5: Launch EC2 Instance
# ==============================================================================

- name: Step 5 - Launch EC2 Instance
  import_playbook: launch-ec2-instance.yml

# ==============================================================================
# Step 6: Setup Secrets Manager
# ==============================================================================
# Creates the Secrets Manager secret and syncs vault values into it.
# Must run after IAM role (Step 2) so the role can access the secret.

- name: Step 6 - Setup Secrets Manager
  import_playbook: setup-secrets-manager.yml

# ==============================================================================
# Step 7: CloudFront CDN (if enabled)
# ==============================================================================
# Controlled by enable_cloudfront in group_vars/vault.yml
# The playbook skips itself if enable_cloudfront is false

- name: Step 7 - Setup CloudFront (if enabled)
  import_playbook: setup-cloudfront.yml

# ==============================================================================
# Summary
# ==============================================================================

- name: Display completion summary
  hosts: localhost
  gather_facts: no
  vars_files:
    - ../group_vars/all.yml
    - ../group_vars/vault.yml
  tasks:
    - name: Find latest instance info file
      find:
        paths: "{{ playbook_dir }}/../instances"
        patterns: "*.txt"
      register: instance_files

    - name: Display summary
      debug:
        msg:
          - "╔══════════════════════════════════════════════════════════╗"
          - "║   Infrastructure Provisioning Complete                  ║"
          - "╚══════════════════════════════════════════════════════════╝"
          - ""
          - "✓ Created:"
          - "  - S3 Bucket: {{ s3_bucket_name }}"
          - "  - IAM Role: {{ app_name }}-ec2-role"
          - "  - Security Group: {{ app_name }}-sg"
          - "  - SSH Key: ~/.ssh/{{ app_name }}-key.pem"
          - "  - EC2 Instance"
          - "  - Secrets Manager: {{ secret_name }}"
          - "  - CloudFront CDN: {{ 'enabled' if (enable_cloudfront | default(false) | bool) else 'skipped (set enable_cloudfront: true in vault.yml to add later)' }}"
          - ""
          - "Instance info saved to: deployment/instances/"
          - ""
          - "Next: Prepare server, then deploy application"
          - "  ansible-playbook playbooks/setup-server.yml --vault-password-file ~/.vault_pass"
          - "  ansible-playbook playbooks/setup.yml --vault-password-file ~/.vault_pass"

