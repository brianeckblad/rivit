---
# Playbook to create IAM role for EC2 instance
# Single purpose: Create IAM role with necessary policies
#
# Usage: ansible-playbook playbooks/create-iam-role.yml

- name: Create IAM Role for EC2
  hosts: localhost
  gather_facts: no
  vars_files:
    - ../group_vars/all.yml
    - ../group_vars/vault.yml

  tasks:
    - name: Create IAM role for EC2 instance
      amazon.aws.iam_role:
        name: "{{ app_name }}-ec2-role"
        assume_role_policy_document:
          Version: "2012-10-17"
          Statement:
            - Effect: Allow
              Principal:
                Service: ec2.amazonaws.com
              Action: sts:AssumeRole
        managed_policies:
          - "arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore"
        create_instance_profile: false
        delete_instance_profile: false
        purge_policies: false
        description: "IAM role for {{ app_name }} EC2 instance"
        tags:
          Application: "{{ app_name }}"
          Environment: production
          ManagedBy: Ansible

    - name: Attach S3 access policy to role
      amazon.aws.iam_policy:
        iam_type: role
        iam_name: "{{ app_name }}-ec2-role"
        policy_name: "{{ app_name }}-s3-access"
        state: present
        policy_json:
          Version: "2012-10-17"
          Statement:
            - Effect: Allow
              Action:
                - s3:GetObject
                - s3:PutObject
                - s3:DeleteObject
                - s3:ListBucket
              Resource:
                - "arn:aws:s3:::{{ s3_bucket_name }}/*"
                - "arn:aws:s3:::{{ s3_bucket_name }}"

    - name: Attach Secrets Manager access policy to role
      amazon.aws.iam_policy:
        iam_type: role
        iam_name: "{{ app_name }}-ec2-role"
        policy_name: "{{ app_name }}-secrets-access"
        state: present
        policy_json:
          Version: "2012-10-17"
          Statement:
            - Effect: Allow
              Action:
                - secretsmanager:GetSecretValue
                - secretsmanager:DescribeSecret
                - secretsmanager:CreateSecret
                - secretsmanager:PutSecretValue
                - secretsmanager:DeleteSecret
                - secretsmanager:TagResource
              Resource: "arn:aws:secretsmanager:{{ aws_region }}:*:secret:{{ app_name }}/*"

    - name: Attach CloudWatch access policy to role
      amazon.aws.iam_policy:
        iam_type: role
        iam_name: "{{ app_name }}-ec2-role"
        policy_name: "{{ app_name }}-cloudwatch-access"
        state: present
        policy_json:
          Version: "2012-10-17"
          Statement:
            - Effect: Allow
              Action:
                - cloudwatch:PutMetricData
                - logs:CreateLogGroup
                - logs:CreateLogStream
                - logs:PutLogEvents
                - logs:DescribeLogStreams
              Resource: "*"

    - name: Enable EC2 Serial Console access for the account
      ansible.builtin.command:
        cmd: >
          aws ec2 enable-serial-console-access
          --region {{ aws_region }}
      register: serial_console_result
      changed_when: true
      ignore_errors: true

    - name: Create serial console access IAM policy
      amazon.aws.iam_policy:
        iam_type: role
        iam_name: "{{ app_name }}-ec2-role"
        policy_name: "{{ app_name }}-serial-console-access"
        state: present
        policy_json:
          Version: "2012-10-17"
          Statement:
            - Effect: Allow
              Action:
                - ec2-instance-connect:SendSerialConsoleSSHPublicKey
              Resource: "arn:aws:ec2:{{ aws_region }}:*:instance/*"

    - name: Create IAM instance profile
      amazon.aws.iam_instance_profile:
        name: "{{ app_name }}-instance-profile"
        role: "{{ app_name }}-ec2-role"
        state: present

    - name: Display IAM role info
      debug:
        msg:
          - "✓ IAM role created successfully"
          - "Role: {{ app_name }}-ec2-role"
          - "Instance Profile: {{ app_name }}-instance-profile"
          - "Policies: S3, Secrets Manager, CloudWatch, SSM, Serial Console"
