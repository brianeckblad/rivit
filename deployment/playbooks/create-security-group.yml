---
# Playbook to create security group for EC2 instance
# Single purpose: Create security group with necessary ingress/egress rules
#
# Security Best Practices:
#   - Restricts inbound traffic to necessary ports only
#   - Allows all outbound traffic (for updates, external APIs)
#   - SSH restricted by default (0.0.0.0/0) - consider restricting to your IP
#
# Usage: ansible-playbook playbooks/create-security-group.yml

- name: Create Security Group
  hosts: localhost
  gather_facts: no
  vars_files:
    - ../group_vars/all.yml
    - ../group_vars/vault.yml

  tasks:
    - name: Create security group
      amazon.aws.ec2_security_group:
        name: "{{ app_name }}-sg"
        description: "Security group for {{ app_display_name }} - Managed by Ansible"
        region: "{{ aws_region }}"

        # Ingress Rules (Inbound Traffic)
        rules:
          # SSH Access (Port 22) - For server administration
          - proto: tcp
            from_port: 22
            to_port: 22
            cidr_ip: 0.0.0.0/0
            rule_desc: "SSH - Server administration"

          # HTTP Access (Port 80) - For web traffic
          - proto: tcp
            from_port: 80
            to_port: 80
            cidr_ip: 0.0.0.0/0
            rule_desc: "HTTP - Web traffic"

          # HTTPS Access (Port 443) - For secure web traffic
          - proto: tcp
            from_port: 443
            to_port: 443
            cidr_ip: 0.0.0.0/0
            rule_desc: "HTTPS - Secure web traffic"

        # Egress Rules (Outbound Traffic)
        # Implicit allow: All traffic (0.0.0.0/0)
        # No need to restrict unless you have specific security requirements

        tags:
          Name: "{{ app_name }}-sg"
          Application: "{{ app_name }}"
          Environment: production
          ManagedBy: Ansible
          CreatedDate: "{{ now(utc=true, fmt='%Y-%m-%dT%H:%M:%SZ') }}"

    - name: Display security group information
      debug:
        msg:
          - ""
          - "✓ Security Group Created Successfully"
          - ""
          - "Name:                 {{ app_name }}-sg"
          - "Region:               {{ aws_region }}"
          - ""
          - "Ingress Rules:"
          - "  • SSH (22):         All sources (0.0.0.0/0)"
          - "  • HTTP (80):        All sources (0.0.0.0/0)"
          - "  • HTTPS (443):      All sources (0.0.0.0/0)"
          - ""
          - "Egress Rules:"
          - "  • All traffic:      All destinations (0.0.0.0/0)"
          - ""
          - "⚠️  SECURITY NOTE:"
          - "SSH access (port 22) is open to all sources (0.0.0.0/0)."
          - "For production, consider restricting SSH to specific IPs:"
          - "  • Your office IP"
          - "  • Your home IP"
          - "  • VPN IP ranges"
          - ""
          - "To modify SSH access later, edit the security group in AWS Console."
          - ""

