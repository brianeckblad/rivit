---
# Playbook to sync secrets from Ansible Vault to AWS Secrets Manager
# This replaces secret-sync-vault.sh
#
# Usage: ansible-playbook playbooks/secret-sync.yml

- name: Sync Secrets to AWS
  hosts: localhost
  gather_facts: no
  vars_files:
    - ../group_vars/all.yml
    - ../group_vars/vault.yml

  vars:
    aws_secret_name: "{{ app_name }}/secrets"

  tasks:
    - name: Read Ansible Vault secrets
      command: ansible-vault view {{ playbook_dir }}/../group_vars/vault.yml --vault-password-file ~/.vault_pass
      register: vault_contents
      changed_when: false

    - name: Parse vault secrets
      set_fact:
        vault_secrets: {}

    - name: Extract all vault_ prefixed secrets
      set_fact:
        vault_secrets: "{{ vault_secrets | combine({item.key: item.value}) }}"
      loop: "{{ vault_contents.stdout | regex_findall('vault_([^:]+): [\"\\']?(.+?)[\"\\']?$', multiline=True) }}"
      vars:
        item:
          key: "{{ item[0] }}"
          value: "{{ item[1] }}"
      when: not item[0].endswith('_new')

    - name: Display secrets to sync
      debug:
        msg:
          - "Syncing {{ vault_secrets | length }} secrets to AWS"
          - "AWS Secret: {{ aws_secret_name }}"
          - "Keys: {{ vault_secrets.keys() | list }}"

    - name: Check if AWS secret exists
      command: >
        aws secretsmanager describe-secret
        --secret-id {{ aws_secret_name }}
      register: secret_exists
      failed_when: false
      changed_when: false

    - name: Create AWS secret if it doesn't exist
      command: >
        aws secretsmanager create-secret
        --name {{ aws_secret_name }}
        --description "Secrets for {{ app_display_name }}"
        --secret-string '{}'
      when: secret_exists.rc != 0

    - name: Update AWS Secrets Manager with vault contents
      command: >
        aws secretsmanager update-secret
        --secret-id {{ aws_secret_name }}
        --secret-string '{{ vault_secrets | to_json }}'
      register: sync_result

    - name: Display success message
      debug:
        msg:
          - "✓ Secrets synced successfully!"
          - "AWS Secret: {{ aws_secret_name }}"
          - "Synced {{ vault_secrets | length }} keys"
          - ""
          - "Keys synced:"
          - "{{ vault_secrets.keys() | list }}"

