---
# Playbook to sync secrets from Ansible Vault to AWS Secrets Manager
#
# Usage: ansible-playbook playbooks/secret-sync.yml \
#          --vault-password-file ~/.vault_pass
#
# IMPORTANT: If vault.yml is encrypted, provide vault password via:
# 1. ~/.vault_pass file (recommended), OR
# 2. --ask-vault-pass flag (will prompt for password)

- name: Sync Secrets to AWS
  hosts: localhost
  gather_facts: no
  vars_files:
    - ../group_vars/all.yml
    - ../group_vars/vault.yml
  vars:
    # Build the Secrets Manager payload automatically from vault variables.
    # Key names are UPPERCASED to match config.py get_secret() calls.
    # To add a new secret: just add the variable to vault.yml.
    aws_secrets:
      SECRET_KEY: "{{ secret_key }}"
      S3_BUCKET_NAME: "{{ s3_bucket_name }}"
      S3_FOLDER: "{{ s3_folder }}"
      AWS_REGION: "{{ aws_region }}"
      SNS_TOPIC_ARN: "{{ sns_topic_arn | default('') }}"
      APP_DEFAULT_USERNAME: "{{ app_default_username }}"
      APP_DEFAULT_PASSWORD: "{{ app_default_password }}"
      CLOUDFRONT_DOMAIN: "{{ cloudfront_domain | default('') }}"
      APP_SECRET_TOKEN: "{{ app_secret_token | default('') }}"
      EBAY_ENVIRONMENT: "{{ ebay_environment | default('production') }}"
      EBAY_VERIFICATION_TOKEN: "{{ ebay_verification_token | default('') }}"
      EBAY_PRODUCTION_APP_ID: "{{ ebay_production_app_id | default('') }}"
      EBAY_PRODUCTION_CERT_ID: "{{ ebay_production_cert_id | default('') }}"
      EBAY_PRODUCTION_DEV_ID: "{{ ebay_production_dev_id | default('') }}"
      EBAY_PRODUCTION_TOKEN: "{{ ebay_production_token | default('') }}"
      EBAY_SANDBOX_APP_ID: "{{ ebay_sandbox_app_id | default('') }}"
      EBAY_SANDBOX_CERT_ID: "{{ ebay_sandbox_cert_id | default('') }}"
      EBAY_SANDBOX_DEV_ID: "{{ ebay_sandbox_dev_id | default('') }}"
      EBAY_SANDBOX_TOKEN: "{{ ebay_sandbox_token | default('') }}"

  tasks:
    - name: Display secrets to sync
      debug:
        msg:
          - "Syncing {{ aws_secrets | length }} secrets to AWS"
          - "AWS Secret: {{ secret_name }}"

    - name: Check if AWS secret exists
      command: >
        aws secretsmanager describe-secret
        --secret-id {{ secret_name }}
      register: secret_exists
      failed_when: false
      changed_when: false

    - name: Create AWS secret if it doesn't exist
      command: >
        aws secretsmanager create-secret
        --name {{ secret_name }}
        --description "Secrets for {{ app_display_name }}"
        --secret-string '{}'
      when: secret_exists.rc != 0

    - name: Update AWS Secrets Manager with vault contents
      command: >
        aws secretsmanager update-secret
        --secret-id {{ secret_name }}
        --secret-string '{{ aws_secrets | to_json }}'
      register: sync_result

    - name: Display success message
      debug:
        msg:
          - "✓ Secrets synced successfully!"
          - "AWS Secret: {{ secret_name }}"
          - "Synced {{ aws_secrets | length }} keys"
