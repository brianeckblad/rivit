---
# Playbook to provision EC2 instance with IAM role for application deployment
# This replaces ec2-create-instance.sh and iam-role-setup.sh

- name: Provision EC2 Infrastructure
  hosts: localhost
  gather_facts: false
  vars:
    # These are read from group_vars/all.yml
    instance_type: "{{ ec2_instance_type | default('t3.micro') }}"
    ami_owner: "099720109477"  # Canonical (Ubuntu)
    ami_name: "ubuntu/images/hvm-ssd/ubuntu-jammy-22.04-amd64-server-*"

  tasks:
    # ========================================
    # Phase 1: IAM Role for EC2
    # ========================================

    - name: Create IAM role for EC2 instance
      community.aws.iam_role:
        name: "{{ app_name }}-ec2-role"
        assume_role_policy_document:
          Version: "2012-10-17"
          Statement:
            - Effect: Allow
              Principal:
                Service: ec2.amazonaws.com
              Action: sts:AssumeRole
        description: "IAM role for {{ app_name }} EC2 instance"
        tags:
          Application: "{{ app_name }}"
          ManagedBy: Ansible
      register: iam_role

    - name: Attach S3 access policy to role
      community.aws.iam_policy:
        iam_type: role
        iam_name: "{{ app_name }}-ec2-role"
        policy_name: "{{ app_name }}-s3-access"
        state: present
        policy_json:
          Version: "2012-10-17"
          Statement:
            - Effect: Allow
              Action:
                - s3:GetObject
                - s3:PutObject
                - s3:DeleteObject
                - s3:ListBucket
              Resource:
                - "arn:aws:s3:::{{ s3_bucket_name }}/*"
                - "arn:aws:s3:::{{ s3_bucket_name }}"

    - name: Attach Secrets Manager access policy to role
      community.aws.iam_policy:
        iam_type: role
        iam_name: "{{ app_name }}-ec2-role"
        policy_name: "{{ app_name }}-secrets-access"
        state: present
        policy_json:
          Version: "2012-10-17"
          Statement:
            - Effect: Allow
              Action:
                - secretsmanager:GetSecretValue
                - secretsmanager:DescribeSecret
              Resource: "arn:aws:secretsmanager:{{ aws_region }}:*:secret:{{ app_name }}/*"

    - name: Attach CloudWatch access policy to role
      community.aws.iam_policy:
        iam_type: role
        iam_name: "{{ app_name }}-ec2-role"
        policy_name: "{{ app_name }}-cloudwatch-access"
        state: present
        policy_json:
          Version: "2012-10-17"
          Statement:
            - Effect: Allow
              Action:
                - cloudwatch:PutMetricData
                - logs:CreateLogGroup
                - logs:CreateLogStream
                - logs:PutLogEvents
                - logs:DescribeLogStreams
              Resource: "*"

    - name: Attach SSM access policy (for remote management)
      community.aws.iam_role_policy_attachment:
        role_name: "{{ app_name }}-ec2-role"
        policy_arn: "arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore"
        state: present

    - name: Create IAM instance profile
      community.aws.iam_instance_profile:
        name: "{{ app_name }}-instance-profile"
        role: "{{ app_name }}-ec2-role"
        state: present
      register: instance_profile

    # ========================================
    # Phase 2: EC2 Infrastructure
    # ========================================

    - name: Get latest Ubuntu 22.04 AMI
      amazon.aws.ec2_ami_info:
        region: "{{ aws_region }}"
        owners: "{{ ami_owner }}"
        filters:
          name: "{{ ami_name }}"
      register: amis

    - name: Set AMI ID (latest)
      set_fact:
        ami_id: "{{ amis.images | sort(attribute='creation_date') | last | map(attribute='image_id') | first }}"

    - name: Create security group
      amazon.aws.ec2_security_group:
        name: "{{ app_name }}-sg"
        description: "Security group for {{ app_display_name }}"
        region: "{{ aws_region }}"
        rules:
          - proto: tcp
            from_port: 22
            to_port: 22
            cidr_ip: 0.0.0.0/0
            rule_desc: "SSH"
          - proto: tcp
            from_port: 80
            to_port: 80
            cidr_ip: 0.0.0.0/0
            rule_desc: "HTTP"
          - proto: tcp
            from_port: 443
            to_port: 443
            cidr_ip: 0.0.0.0/0
            rule_desc: "HTTPS"
      register: security_group

    - name: Create SSH key pair
      amazon.aws.ec2_key:
        name: "{{ app_name }}-key"
        region: "{{ aws_region }}"
      register: key_pair

    - name: Save private key locally
      copy:
        content: "{{ key_pair.key.private_key }}"
        dest: "~/.ssh/{{ app_name }}-key.pem"
        mode: '0400'
      when: key_pair.changed

    - name: Launch EC2 instance
      amazon.aws.ec2_instance:
        name: "{{ app_name }}"
        instance_type: "{{ instance_type }}"
        image_id: "{{ ami_id }}"
        region: "{{ aws_region }}"
        key_name: "{{ app_name }}-key"
        security_group: "{{ app_name }}-sg"
        iam_instance_profile: "{{ app_name }}-instance-profile"
        wait: yes
        wait_timeout: 300
        tags:
          Name: "{{ app_name }}"
          Application: "{{ app_name }}"
          Environment: production
          ManagedBy: Ansible
      register: ec2

    - name: Get instance public IP
      set_fact:
        instance_ip: "{{ ec2.instances[0].public_ip_address }}"

    - name: Display instance information
      debug:
        msg:
          - "EC2 Instance Created Successfully!"
          - "Instance ID: {{ ec2.instances[0].instance_id }}"
          - "Public IP: {{ instance_ip }}"
          - "SSH Command: ssh -i ~/.ssh/{{ app_name }}-key.pem ubuntu@{{ instance_ip }}"
          - ""
          - "Next steps:"
          - "1. Update deployment/inventories/production/hosts.yml with IP: {{ instance_ip }}"
          - "2. Run: ansible-playbook -i inventories/production playbooks/setup.yml"

    - name: Wait for SSH to become available
      wait_for:
        host: "{{ instance_ip }}"
        port: 22
        delay: 30
        timeout: 300
        state: started

    - name: Save instance IP to file
      copy:
        content: |
          # EC2 Instance Information
          # Created: {{ ansible_date_time.iso8601 }}
          
          Instance ID: {{ ec2.instances[0].instance_id }}
          Public IP: {{ instance_ip }}
          SSH Key: ~/.ssh/{{ app_name }}-key.pem
          
          Update this IP in: deployment/inventories/production/hosts.yml
        dest: "{{ playbook_dir }}/../instance-info.txt"

