---
# Playbook to decommission ALL AWS infrastructure
# Removes resources in REVERSE order of creation to respect dependencies
#
# ⚠️  WARNING: This is DESTRUCTIVE and IRREVERSIBLE
# All data in S3, EC2 instances, and associated resources will be PERMANENTLY deleted
#
# Recommended usage (interactive menu with graceful exits):
#   cd deployment
#   ./scripts/decommission.sh
#
# Direct playbook usage (skips discovery menu):
#   ansible-playbook playbooks/decommission.yml --vault-password-file ~/.vault_pass -e decommission_confirmed=true
#
# What gets deleted (in order):
#   1. EC2 Instance (terminated)
#   2. SSH Key Pair (AWS + local file)
#   3. Security Group
#   4. IAM Role, Policies, Instance Profile
#   5. S3 Bucket (emptied then deleted - ALL DATA LOST)
#   6. Optional: WAF, CloudFront, Secrets Manager
#
# To delete a SINGLE resource instead, use the individual playbooks:
#   ansible-playbook playbooks/terminate-ec2-instance.yml --vault-password-file ~/.vault_pass
#   ansible-playbook playbooks/delete-ssh-key.yml --vault-password-file ~/.vault_pass
#   ansible-playbook playbooks/delete-security-group.yml --vault-password-file ~/.vault_pass
#   ansible-playbook playbooks/delete-iam-role.yml --vault-password-file ~/.vault_pass
#   ansible-playbook playbooks/delete-s3-bucket.yml --vault-password-file ~/.vault_pass
#   ansible-playbook playbooks/delete-waf.yml --vault-password-file ~/.vault_pass
#   ansible-playbook playbooks/delete-cloudfront.yml --vault-password-file ~/.vault_pass
#   ansible-playbook playbooks/delete-secrets-manager.yml --vault-password-file ~/.vault_pass

# ==============================================================================
# Safety Gate
# ==============================================================================

- name: Confirm Decommission
  hosts: localhost
  gather_facts: no
  vars_files:
    - ../group_vars/all.yml
    - ../group_vars/vault.yml

  tasks:
    - name: Check confirmation flag
      fail:
        msg: |
          This playbook should be run through the wrapper script:
            cd deployment
            ./scripts/decommission.sh

          The script provides a discovery menu and graceful exits when
          there are no resources to decommission.

          To bypass the script and run directly, pass:
            -e decommission_confirmed=true
      when: decommission_confirmed | default(false) | bool != true

    - name: Display decommission plan
      debug:
        msg:
          - "Decommissioning: {{ app_name }}"
          - "Region: {{ aws_region }}"
          - ""
          - "Starting teardown in reverse order..."

# ==============================================================================
# Step 1: Terminate EC2 Instance
# ==============================================================================

- name: Step 1 - Terminate EC2 Instance
  import_playbook: terminate-ec2-instance.yml

# ==============================================================================
# Step 2: Delete SSH Key Pair
# ==============================================================================

- name: Step 2 - Delete SSH Key Pair
  import_playbook: delete-ssh-key.yml

# ==============================================================================
# Step 3: Delete Security Group
# ==============================================================================

- name: Step 3 - Delete Security Group
  import_playbook: delete-security-group.yml

# ==============================================================================
# Step 4: Delete IAM Role, Policies, Instance Profile
# ==============================================================================

- name: Step 4 - Delete IAM Role
  import_playbook: delete-iam-role.yml

# ==============================================================================
# Step 5: Delete S3 Bucket
# ==============================================================================

- name: Step 5 - Delete S3 Bucket
  import_playbook: delete-s3-bucket.yml

# ==============================================================================
# Step 6: Delete Optional Features (best-effort, skip if not configured)
# ==============================================================================

- name: Step 6a - Delete WAF
  import_playbook: delete-waf.yml

- name: Step 6b - Delete CloudFront
  import_playbook: delete-cloudfront.yml

- name: Step 6c - Delete Secrets Manager
  import_playbook: delete-secrets-manager.yml

# ==============================================================================
# Step 7: Final Cleanup
# ==============================================================================

- name: Decommission Cleanup
  hosts: localhost
  gather_facts: no
  vars_files:
    - ../group_vars/all.yml
    - ../group_vars/vault.yml

  tasks:
    - name: Remove local info files
      file:
        path: "{{ item }}"
        state: absent
      loop:
        - "{{ playbook_dir }}/../instance-info.txt"
        - "{{ playbook_dir }}/../cloudfront-info.txt"
        - "{{ playbook_dir }}/../waf-info.txt"
        - "{{ playbook_dir }}/../.last-rotation.txt"
      failed_when: false

    - name: Remove all instance info files
      shell: "rm -f {{ playbook_dir }}/../instances/*.txt"
      changed_when: false
      failed_when: false

    - name: Display decommission summary
      debug:
        msg:
          - ""
          - "╔══════════════════════════════════════════════════════════╗"
          - "║   Decommission Complete                                 ║"
          - "╚══════════════════════════════════════════════════════════╝"
          - ""
          - "Core Resources Deleted:"
          - "  ✓ EC2 Instance:       {{ app_name }}"
          - "  ✓ SSH Key Pair:       {{ app_name }}-key"
          - "  ✓ Security Group:     {{ app_name }}-sg"
          - "  ✓ IAM Role:           {{ app_name }}-ec2-role"
          - "  ✓ Instance Profile:   {{ app_name }}-instance-profile"
          - "  ✓ S3 Bucket:          {{ s3_bucket_name }}"
          - ""
          - "Optional Features (deleted if present):"
          - "  ✓ WAF Web ACL:        {{ app_name }}-web-acl"
          - "  ✓ CloudFront:         {{ app_name }} distribution"
          - "  ✓ Secrets Manager:    {{ secret_name }}"
          - ""
          - "All AWS resources for {{ app_name }} have been removed."
          - ""
          - "To recreate everything:"
          - "  ansible-playbook playbooks/provision-infrastructure.yml --vault-password-file ~/.vault_pass"
