---
# Server preparation: system packages, app user, EBS volume mount
# Run this ONCE after launching an EC2 instance (Step 5).
# Usage: ansible-playbook playbooks/setup-server.yml --vault-password-file ~/.vault_pass

- name: Prepare Server — System Config & EBS Volume
  hosts: all
  become: yes
  vars_files:
    - ../group_vars/all.yml
    - ../group_vars/vault.yml

  tasks:

    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install system dependencies
      apt:
        name: "{{ system_packages }}"
        state: present

    # =========================================================================
    # SECURITY: Create dedicated application user
    # =========================================================================
    # This user:
    #   - Has no shell access (nologin)
    #   - Has no home directory
    #   - Cannot SSH to the server
    #   - Is a system user (UID < 1000)
    #   - Can only run the application (via systemd)
    # Benefits:
    #   - Principle of least privilege
    #   - Limited blast radius if app compromised
    #   - Separates deployment from runtime permissions
    - name: Create dedicated application user (no shell, no SSH)
      user:
        name: "{{ app_user }}"
        comment: "{{ app_display_name }} Application User (no login)"
        shell: /usr/sbin/nologin
        system: yes
        create_home: no
        state: present
      when: app_user != admin_user

    # =========================================================================
    # EBS VOLUME → /opt/{app_name} (MANDATORY)
    # =========================================================================
    # The EBS data volume is mounted at /opt/{app_name} so that all
    # application code, logs, and data live on persistent storage.
    #
    # /home is left on the root volume.  This keeps the ubuntu user's
    # SSH authorized_keys intact across reboots and avoids the fragile
    # /home migration that previously broke SSH access.
    #
    # Nitro instances (t3 family) present EBS volumes as NVMe devices:
    #   EC2 API name /dev/sdf → on-instance /dev/nvme1n1
    # The volume is a raw block device (no partition table).

    - name: Wait for EBS data volume (NVMe)
      wait_for:
        path: "{{ ebs_nvme_device }}"
        state: present
        timeout: 120

    - name: Set actual EBS device path
      set_fact:
        ebs_actual_device: "{{ ebs_nvme_device }}"

    - name: Check if EBS volume is already formatted
      command: "blkid {{ ebs_actual_device }}"
      register: ebs_formatted
      failed_when: false
      changed_when: false

    - name: Create XFS filesystem on EBS volume (if needed)
      command: "mkfs.xfs -f {{ ebs_actual_device }}"
      when: ebs_formatted.rc != 0

    - name: Get UUID of EBS volume
      command: "blkid -s UUID -o value {{ ebs_actual_device }}"
      register: ebs_uuid
      changed_when: false

    # --- Mount EBS at /opt/{app_name} (persists across reboots via fstab) ---
    - name: Create EBS mount point
      file:
        path: "{{ ebs_volume_mount_path }}"
        state: directory
        mode: '0755'

    - name: Mount EBS volume at {{ ebs_volume_mount_path }}
      mount:
        path: "{{ ebs_volume_mount_path }}"
        src: "UUID={{ ebs_uuid.stdout }}"
        fstype: xfs
        opts: defaults,nofail
        state: mounted

    # After mount the XFS root inode is owned by root.
    # Set ownership to admin_user so git clone/venv creation work.
    - name: Set mount point ownership and permissions
      file:
        path: "{{ ebs_volume_mount_path }}"
        owner: "{{ admin_user }}"
        group: "{{ admin_user }}"
        mode: '0755'
        state: directory

    # =========================================================================
    # Create application directories on EBS volume
    # =========================================================================


    - name: Create instance directory for data persistence
      file:
        path: "{{ app_dir }}/instance"
        state: directory
        owner: "{{ admin_user }}"
        group: "{{ admin_user }}"
        mode: '0755'

    - name: Create log directory
      file:
        path: "{{ log_dir }}"
        state: directory
        owner: "{{ admin_user }}"
        group: "{{ admin_user }}"
        mode: '0755'

    # =========================================================================
    # Display summary
    # =========================================================================

    - name: Display server setup summary
      debug:
        msg:
          - "✓ Server Preparation Complete"
          - ""
          - "  EBS Volume:"
          - "    Device: {{ ebs_actual_device }}"
          - "    Mount: {{ ebs_volume_mount_path }}"
          - "    Size: {{ ebs_volume_size }} GB ({{ ebs_volume_type }})"
          - "    Encrypted: {{ ebs_volume_encrypted }}"
          - "    UUID: {{ ebs_uuid.stdout }}"
          - ""
          - "  Directories created:"
          - "    App:      {{ app_dir }}"
          - "    Data:     {{ app_dir }}/instance"
          - "    Logs:     {{ log_dir }}"
          - ""
          - "  App user: {{ app_user }} (nologin)"
          - ""
          - "  Ready for application deployment:"
          - "    ansible-playbook playbooks/setup.yml --vault-password-file ~/.vault_pass"

