---
# Server preparation: system packages, app user, EBS volume mount
# Run this ONCE after launching an EC2 instance (Step 5).
# Usage: ansible-playbook playbooks/setup-server.yml --vault-password-file ~/.vault_pass

- name: Prepare Server — System Config & EBS Volume
  hosts: all
  become: yes
  vars_files:
    - ../group_vars/all.yml
    - ../group_vars/vault.yml

  tasks:

    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install system dependencies
      apt:
        name: "{{ system_packages }}"
        state: present

    # =========================================================================
    # SECURITY: Create dedicated application user
    # =========================================================================
    # This user:
    #   - Has no shell access (nologin)
    #   - Has no home directory
    #   - Cannot SSH to the server
    #   - Is a system user (UID < 1000)
    #   - Can only run the application (via systemd)
    # Benefits:
    #   - Principle of least privilege
    #   - Limited blast radius if app compromised
    #   - Separates deployment from runtime permissions

    - name: Create shared application group
      group:
        name: "{{ app_name }}"
        state: present

    - name: Create dedicated application user (no shell, no SSH)
      user:
        name: "{{ app_user }}"
        comment: "{{ app_display_name }} Application User (no login)"
        shell: /usr/sbin/nologin
        system: yes
        create_home: no
        groups: "{{ app_name }}"
        append: yes
        state: present
      when: app_user != admin_user

    - name: Add admin user to application group
      user:
        name: "{{ admin_user }}"
        groups: "{{ app_name }}"
        append: yes

    # =========================================================================
    # EBS VOLUME → /opt/{app_name} (MANDATORY)
    # =========================================================================
    # The EBS data volume is mounted at /opt/{app_name} so that all
    # application code, logs, and data live on persistent storage.
    #
    # /home is left on the root volume.  This keeps the ubuntu user's
    # SSH authorized_keys intact across reboots and avoids the fragile
    # /home migration that previously broke SSH access.
    #
    # Nitro instances (t3 family) present EBS volumes as NVMe devices:
    #   EC2 API name /dev/sdf → on-instance /dev/nvme1n1
    # The volume is a raw block device (no partition table).

    - name: Wait for EBS data volume (NVMe)
      wait_for:
        path: "{{ ebs_nvme_device }}"
        state: present
        timeout: 120

    - name: Set actual EBS device path
      set_fact:
        ebs_actual_device: "{{ ebs_nvme_device }}"

    - name: Check if EBS volume is already formatted
      command: "blkid {{ ebs_actual_device }}"
      register: ebs_formatted
      failed_when: false
      changed_when: false

    - name: Create XFS filesystem on EBS volume (if needed)
      command: "mkfs.xfs -f {{ ebs_actual_device }}"
      when: ebs_formatted.rc != 0

    - name: Get UUID of EBS volume
      command: "blkid -s UUID -o value {{ ebs_actual_device }}"
      register: ebs_uuid
      changed_when: false

    # --- Mount EBS at /opt/{app_name} (persists across reboots via fstab) ---
    - name: Create EBS mount point
      file:
        path: "{{ ebs_volume_mount_path }}"
        state: directory
        mode: '0755'

    - name: Mount EBS volume at {{ ebs_volume_mount_path }}
      mount:
        path: "{{ ebs_volume_mount_path }}"
        src: "UUID={{ ebs_uuid.stdout }}"
        fstype: xfs
        opts: defaults,nofail
        state: mounted

    # After mount the XFS root inode is owned by root.
    # Set ownership to admin_user with shared app group + setgid.
    # Setgid (2xxx) ensures all new files/dirs inherit the app group,
    # so both admin_user and app_user can access everything.
    - name: Set mount point ownership and permissions
      file:
        path: "{{ ebs_volume_mount_path }}"
        owner: "{{ admin_user }}"
        group: "{{ app_name }}"
        mode: '2775'
        state: directory

    # =========================================================================
    # Create application directories on EBS volume
    # =========================================================================


    - name: Create instance directory for data persistence
      file:
        path: "{{ app_dir }}/instance"
        state: directory
        owner: "{{ admin_user }}"
        group: "{{ app_name }}"
        mode: '2775'

    - name: Create log directory
      file:
        path: "{{ log_dir }}"
        state: directory
        owner: "{{ admin_user }}"
        group: "{{ app_name }}"
        mode: '2775'

    # =========================================================================
    # SECURITY HARDENING (applied automatically on every server setup)
    # =========================================================================
    # Full OS-level hardening: auto-updates, SSH lockdown, fail2ban, sysctl.
    # See Chapter 8: Security Hardening for verification and tuning details.

    - name: Security Hardening - System Updates
      block:
        - name: Update all packages to latest versions
          apt:
            upgrade: dist
            update_cache: yes
            cache_valid_time: 3600
          register: apt_upgrade

        - name: Check if reboot is required
          stat:
            path: /var/run/reboot-required
          register: reboot_required_file

        - name: Notify if reboot required
          debug:
            msg: "⚠️  REBOOT REQUIRED after setup - Run: sudo reboot"
          when: reboot_required_file.stat.exists

    - name: Security Hardening - Automatic Security Updates
      block:
        - name: Install unattended-upgrades
          apt:
            name:
              - unattended-upgrades
              - apt-listchanges
            state: present

        - name: Configure unattended-upgrades for security updates only
          template:
            src: ../templates/50unattended-upgrades.j2
            dest: /etc/apt/apt.conf.d/50unattended-upgrades
            owner: root
            group: root
            mode: '0644'

        - name: Enable automatic updates
          template:
            src: ../templates/20auto-upgrades.j2
            dest: /etc/apt/apt.conf.d/20auto-upgrades
            owner: root
            group: root
            mode: '0644'

    - name: Security Hardening - SSH Configuration
      block:
        - name: Disable SSH password authentication (key-only)
          lineinfile:
            path: /etc/ssh/sshd_config
            regexp: '^#?PasswordAuthentication'
            line: 'PasswordAuthentication no'
            state: present
          notify: restart sshd

        - name: Disable SSH root login
          lineinfile:
            path: /etc/ssh/sshd_config
            regexp: '^#?PermitRootLogin'
            line: 'PermitRootLogin no'
            state: present
          notify: restart sshd

        - name: Set SSH MaxAuthTries
          lineinfile:
            path: /etc/ssh/sshd_config
            regexp: '^#?MaxAuthTries'
            line: 'MaxAuthTries 3'
            state: present
          notify: restart sshd

    - name: Security Hardening - Shared Memory
      lineinfile:
        path: /etc/fstab
        line: 'tmpfs /run/shm tmpfs defaults,noexec,nosuid 0 0'
        state: present

    - name: Security Hardening - Sysctl Optimizations
      sysctl:
        name: "{{ item.name }}"
        value: "{{ item.value }}"
        state: present
        reload: yes
      loop:
        # IP Spoofing protection
        - { name: 'net.ipv4.conf.all.rp_filter', value: '1' }
        - { name: 'net.ipv4.conf.default.rp_filter', value: '1' }
        # Ignore ICMP broadcast requests
        - { name: 'net.ipv4.icmp_echo_ignore_broadcasts', value: '1' }
        # Disable source packet routing
        - { name: 'net.ipv4.conf.all.accept_source_route', value: '0' }
        - { name: 'net.ipv6.conf.all.accept_source_route', value: '0' }
        - { name: 'net.ipv4.conf.default.accept_source_route', value: '0' }
        - { name: 'net.ipv6.conf.default.accept_source_route', value: '0' }
        # Ignore send redirects
        - { name: 'net.ipv4.conf.all.send_redirects', value: '0' }
        - { name: 'net.ipv4.conf.default.send_redirects', value: '0' }
        # Block SYN attacks
        - { name: 'net.ipv4.tcp_syncookies', value: '1' }
        - { name: 'net.ipv4.tcp_max_syn_backlog', value: '2048' }
        - { name: 'net.ipv4.tcp_synack_retries', value: '2' }
        - { name: 'net.ipv4.tcp_syn_retries', value: '5' }
        # Log Martians
        - { name: 'net.ipv4.conf.all.log_martians', value: '1' }
        - { name: 'net.ipv4.conf.default.log_martians', value: '1' }

    - name: Security Hardening - Fail2Ban (Brute Force Protection)
      block:
        - name: Install fail2ban
          apt:
            name: fail2ban
            state: present

        - name: Configure fail2ban for SSH
          template:
            src: ../templates/jail.local.j2
            dest: /etc/fail2ban/jail.local
            owner: root
            group: root
            mode: '0644'
          notify: restart fail2ban

        - name: Install Nginx filter for limit-req (if not present)
          copy:
            dest: /etc/fail2ban/filter.d/nginx-limit-req.conf
            content: |
              [Definition]
              failregex = ^\s*\[error\] \d+#\d+: \*\d+ limiting requests, client: <HOST>,
              ignoreregex =
            owner: root
            group: root
            mode: '0644'
          notify: restart fail2ban

        - name: Ensure fail2ban is running
          service:
            name: fail2ban
            state: started
            enabled: yes

    - name: Security Hardening - Disable Unused Services
      block:
        - name: List of services to disable (if present)
          set_fact:
            services_to_disable:
              - apache2
              - avahi-daemon
              - cups
              - bluetooth

        - name: Stop and disable unused services
          service:
            name: "{{ item }}"
            state: stopped
            enabled: no
          loop: "{{ services_to_disable }}"
          ignore_errors: yes

    - name: Security Hardening - System Logging
      block:
        - name: Ensure rsyslog is installed
          apt:
            name: rsyslog
            state: present

        - name: Ensure rsyslog is running
          service:
            name: rsyslog
            state: started
            enabled: yes

        - name: Configure log rotation for system logs
          template:
            src: ../templates/rsyslog-rotation.j2
            dest: /etc/logrotate.d/rsyslog
            owner: root
            group: root
            mode: '0644'

    # =========================================================================
    # Display summary
    # =========================================================================

    - name: Display server setup summary
      debug:
        msg:
          - "✓ Server Preparation Complete"
          - ""
          - "  EBS Volume:"
          - "    Device: {{ ebs_actual_device }}"
          - "    Mount: {{ ebs_volume_mount_path }}"
          - "    Size: {{ ebs_volume_size }} GB ({{ ebs_volume_type }})"
          - "    Encrypted: {{ ebs_volume_encrypted }}"
          - "    UUID: {{ ebs_uuid.stdout }}"
          - ""
          - "  Directories created:"
          - "    App:      {{ app_dir }}"
          - "    Data:     {{ app_dir }}/instance"
          - "    Logs:     {{ log_dir }}"
          - ""
          - "  App user: {{ app_user }} (nologin)"
          - ""
          - "  Security hardening applied:"
          - "    ✓ SSH: key-only auth, root login disabled, max 3 retries"
          - "    ✓ Auto-updates: unattended security patches enabled"
          - "    ✓ Fail2ban: brute force protection active"
          - "    ✓ Sysctl: IP spoofing, SYN flood, source routing protections"
          - "    ✓ Services: unused daemons disabled"
          - "    ✓ Logging: rsyslog configured"
          - ""
          - "  Ready for application deployment:"
          - "    ansible-playbook playbooks/setup.yml --vault-password-file ~/.vault_pass"

  handlers:
    - name: restart sshd
      service:
        name: sshd
        state: restarted

    - name: restart fail2ban
      service:
        name: fail2ban
        state: restarted

