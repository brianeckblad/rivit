---
# Playbook to delete Secrets Manager secret
# Counterpart to: setup-secrets-manager.yml
#
# What gets removed:
#   1. Secrets Manager secret ({{ secret_name }})
#
# ⚠️  WARNING: Secret is deleted immediately with no recovery window
#
# Usage: ansible-playbook playbooks/delete-secrets-manager.yml --vault-password-file ~/.vault_pass
#
# To recreate: ansible-playbook playbooks/setup-secrets-manager.yml --vault-password-file ~/.vault_pass

- name: Delete Secrets Manager Secret
  hosts: localhost
  gather_facts: no
  vars_files:
    - ../group_vars/all.yml
    - ../group_vars/vault.yml

  tasks:

    # ── Step 1: Delete the secret ───────────────────────────────────────────
    - name: "Step 1 — Delete Secrets Manager secret"
      command: >
        aws secretsmanager delete-secret
        --secret-id {{ secret_name }}
        --force-delete-without-recovery
        --region {{ aws_region }}
      register: secret_delete
      failed_when: false

    - name: Secret deletion status
      debug:
        msg: "{{ '✓ Secret deleted' if secret_delete.rc == 0 else '⏭ Secret not found (already deleted or never created)' }}"


    # ── Summary ─────────────────────────────────────────────────────────────
    - name: Display result
      debug:
        msg:
          - ""
          - "✓ Secrets Manager secret deleted:  {{ secret_name }}"
          - ""
          - "To recreate:"
          - "  ansible-playbook playbooks/setup-secrets-manager.yml --vault-password-file ~/.vault_pass"

