---
# Playbook to promote AWSPENDING secret to AWSCURRENT
# This replaces secret-promote.sh
#
# Usage: ansible-playbook playbooks/secret-promote.yml -e secret_key=ebay_token

- name: Promote Secret
  hosts: localhost
  gather_facts: no

  vars:
    aws_secret_name: "{{ app_name }}/production"

  tasks:
    - name: Validate secret_key provided
      fail:
        msg: "Please provide secret_key: ansible-playbook playbooks/secret-promote.yml -e secret_key=YOUR_KEY"
      when: secret_key is not defined

    - name: Check for pending rotation
      stat:
        path: "{{ playbook_dir }}/../.last-rotation.txt"
      register: rotation_file

    - name: Read rotation info
      slurp:
        src: "{{ playbook_dir }}/../.last-rotation.txt"
      register: rotation_info
      when: rotation_file.stat.exists

    - name: Display rotation info
      debug:
        msg: "{{ (rotation_info.content | b64decode).split('\n') }}"
      when: rotation_file.stat.exists

    - name: Confirm promotion
      pause:
        prompt: |
          
          ⚠️  This will promote AWSPENDING → AWSCURRENT
          
          Have you tested the application with the new secret?
          Type 'yes' to confirm promotion
      register: confirm

    - name: Fail if not confirmed
      fail:
        msg: "Promotion cancelled"
      when: confirm.user_input != "yes"

    - name: Get secret with both versions
      command: >
        aws secretsmanager describe-secret
        --secret-id {{ aws_secret_name }}
      register: secret_info
      changed_when: false

    - name: Parse secret info
      set_fact:
        secret_data: "{{ secret_info.stdout | from_json }}"

    - name: Check for AWSPENDING version
      fail:
        msg: "No AWSPENDING version found. Run secret-rotate.yml first."
      when: "'AWSPENDING' not in (secret_data.VersionIdsToStages | dict2items | map(attribute='value') | flatten)"

    - name: Promote secret (AWSPENDING → AWSCURRENT)
      command: >
        aws secretsmanager update-secret-version-stage
        --secret-id {{ aws_secret_name }}
        --version-stage AWSCURRENT
        --move-to-version-id {{ secret_data.VersionIdsToStages | dict2items | selectattr('value', 'contains', 'AWSPENDING') | map(attribute='key') | first }}
        --remove-from-version-id {{ secret_data.VersionIdsToStages | dict2items | selectattr('value', 'contains', 'AWSCURRENT') | map(attribute='key') | first }}
      register: promote_result

    - name: Update vault with promoted value
      block:
        - name: Read vault
          command: ansible-vault view {{ playbook_dir }}/../group_vars/vault.yml --vault-password-file ~/.vault_pass
          register: vault_contents
          changed_when: false

        - name: Get new secret value
          set_fact:
            promoted_value: "{{ vault_contents.stdout | regex_search('vault_' + secret_key + '_new: [\"\\']?(.+?)[\"\\']?$', '\\1', multiline=True) | first }}"

        - name: Create temporary updated vault
          copy:
            content: "{{ vault_contents.stdout | regex_replace('(vault_' + secret_key + ': ).*', '\\1\"' + promoted_value + '\"') | regex_replace('vault_' + secret_key + '_new:.*\\n', '') }}"
            dest: "{{ playbook_dir }}/../group_vars/vault.yml.new"

        - name: Encrypt updated vault
          command: >
            ansible-vault encrypt {{ playbook_dir }}/../group_vars/vault.yml.new
            --vault-password-file ~/.vault_pass
            --output {{ playbook_dir }}/../group_vars/vault.yml

        - name: Remove temporary file
          file:
            path: "{{ playbook_dir }}/../group_vars/vault.yml.new"
            state: absent

    - name: Display success message
      debug:
        msg:
          - "✓ Secret promoted successfully!"
          - "Status: AWSCURRENT updated"
          - "Secret: {{ secret_key }}"
          - ""
          - "Vault has been updated:"
          - "  - vault_{{ secret_key }}: Updated to new value"
          - "  - vault_{{ secret_key }}_new: Removed"
          - ""
          - "Next: Commit vault changes to git"

    - name: Remove rotation tracking file
      file:
        path: "{{ playbook_dir }}/../.last-rotation.txt"
        state: absent

