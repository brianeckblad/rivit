---
# Cleanup Server Playbook
#
# This removes all non-essential files from the server after deployment
# It keeps ONLY the application code and instance data
#
# Usage from local machine:
#   ansible-playbook -i deployment/inventories/production/hosts.yml \
#     deployment/playbooks/cleanup-server.yml --ask-vault-pass

- name: Clean up server for security
  hosts: all
  become: yes
  vars_files:
    - ../group_vars/all.yml
    - ../group_vars/production.yml
    - ../group_vars/production/vault.yml

  tasks:
    - name: Display cleanup status
      debug:
        msg:
          - "🧹 Starting server cleanup..."
          - "Removing: deployment files, docs, tests, caches"
          - "Keeping: application code, instance data, venv"

    - name: Remove deployment files
      block:
        - name: Remove deployment directory
          file:
            path: "{{ app_dir }}/deployment"
            state: absent

        - name: Remove docs directory
          file:
            path: "{{ app_dir }}/docs"
            state: absent

        - name: Remove docs from parent (if exists)
          file:
            path: /home/{{ app_user }}/docs
            state: absent

        - name: Remove tests directory
          file:
            path: "{{ app_dir }}/tests"
            state: absent

        - name: Remove .github directory (if exists)
          file:
            path: "{{ app_dir }}/.github"
            state: absent

        - name: Remove label_tools directory (if exists)
          file:
            path: "{{ app_dir }}/label_tools"
            state: absent

    - name: Remove git files
      block:
        - name: Remove .git directory
          file:
            path: "{{ app_dir }}/.git"
            state: absent

        - name: Remove .gitignore
          file:
            path: "{{ app_dir }}/.gitignore"
            state: absent

        - name: Remove .gitmodules (if exists)
          file:
            path: "{{ app_dir }}/.gitmodules"
            state: absent

    - name: Remove cache and build artifacts
      block:
        - name: Remove all __pycache__ directories
          command: find {{ app_dir }} -type d -name __pycache__ -exec rm -rf {} +
          changed_when: false
          failed_when: false

        - name: Remove all .pyc files
          command: find {{ app_dir }} -type f -name "*.pyc" -delete
          changed_when: false
          failed_when: false

        - name: Remove .pytest_cache
          file:
            path: "{{ app_dir }}/.pytest_cache"
            state: absent

        - name: Remove .idea directory (IDE config)
          file:
            path: "{{ app_dir }}/.idea"
            state: absent

        - name: Remove .vscode directory (IDE config)
          file:
            path: "{{ app_dir }}/.vscode"
            state: absent

        - name: Remove .DS_Store (Mac)
          command: find {{ app_dir }} -type f -name ".DS_Store" -delete
          changed_when: false
          failed_when: false

    - name: Clean pip cache
      block:
        - name: Clean pip cache as app user
          become_user: "{{ app_user }}"
          command: pip cache purge
          args:
            chdir: "{{ app_dir }}"
          changed_when: false
          failed_when: false

        - name: Clean root pip cache
          command: pip cache purge
          changed_when: false
          failed_when: false

    - name: Remove unnecessary files
      block:
        - name: Remove README files (except app README)
          file:
            path: "{{ item }}"
            state: absent
          loop:
            - "{{ app_dir }}/CHANGELOG.md"
            - "{{ app_dir }}/CONTRIBUTING.md"
            - "{{ app_dir }}/LICENSE"
            - "{{ app_dir }}/CODE_OF_CONDUCT.md"

        - name: Remove deployment docs from instance
          file:
            path: "{{ app_dir }}/instance/DEPLOYMENT.md"
            state: absent

        - name: Remove .env.example
          file:
            path: "{{ app_dir }}/.env.example"
            state: absent

    - name: Verify essential files remain
      block:
        - name: Check app code exists
          stat:
            path: "{{ app_dir }}/main.py"
          register: main_py

        - name: Check requirements.txt exists
          stat:
            path: "{{ app_dir }}/requirements.txt"
          register: requirements_file

        - name: Check venv exists
          stat:
            path: "{{ app_dir }}/.venv"
          register: venv_dir

        - name: Fail if critical files missing
          fail:
            msg: "ERROR: Critical application files are missing!"
          when: not main_py.stat.exists or not requirements_file.stat.exists or not venv_dir.stat.exists

    - name: Get directory size
      block:
        - name: Calculate app directory size
          shell: du -sh {{ app_dir }} 2>/dev/null | awk '{print $1}'
          register: app_size
          changed_when: false
          failed_when: false

        - name: List what's on server (safe)
          shell: find {{ app_dir }} -maxdepth 1 -type d -o -type f | head -20
          register: server_contents
          changed_when: false
          failed_when: false

    - name: Display cleanup summary
      debug:
        msg:
          - "✅ CLEANUP COMPLETE"
          - ""
          - "🗑️  Removed:"
          - "  • deployment/ directory"
          - "  • docs/ directory"
          - "  • tests/ directory"
          - "  • .git/ directory (saves ~50MB)"
          - "  • __pycache__/ directories"
          - "  • .pytest_cache/"
          - "  • IDE configs (.idea/, .vscode/)"
          - "  • Cache files (pip, python)"
          - ""
          - "✅ Kept:"
          - "  • Application code (app/, main.py, etc.)"
          - "  • Instance data (instance/)"
          - "  • Python venv (.venv/)"
          - "  • Configuration (requirements.txt)"
          - ""
          - "📊 Size: {{ app_size.stdout | default('unknown') }}"
          - ""
          - "🔒 Server is now more secure with minimal footprint"

    - name: Show remaining structure (safe)
      debug:
        msg: "{{ server_contents.stdout_lines }}"
      when: server_contents.stdout is defined
